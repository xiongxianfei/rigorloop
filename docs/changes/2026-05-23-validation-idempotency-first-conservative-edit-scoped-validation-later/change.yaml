requirements:
  - Author a proposal for validation idempotency and cache-hit safety.
  - Record proposal-review R1 findings in durable change-local artifacts.
  - Revise the proposal to resolve VIC-PR1 through VIC-PR5 before downstream spec reliance.
  - Keep Workstream B edit-scoped validation out of the first implementing spec and test spec.
  - Record the first-slice cache-hit evidence file decision as docs/changes/<change-id>/validation-cache-evidence.yaml.
  - Record deterministic implementation manifest contents for validate-artifact-lifecycle.py explicit-path cache eligibility.
  - Record cache-only closeout rejection ownership across artifact lifecycle and change metadata validators.
  - Record branch-local, worktree-local, and change-local cache lifetime limits for the first slice.
  - Record proposal-review R2 approval before downstream spec reliance.
  - Normalize the accepted proposal before downstream spec reliance.
  - Draft the validation idempotency and cache-hit safety spec before test-spec, planning, or implementation.
  - Record spec-review R1 findings before spec revision or downstream reliance.
  - Revise the spec to resolve VIC-SR1 through VIC-SR3 before test-spec, planning, or implementation.
  - Record spec-review R2 approval before downstream architecture, plan, test-spec, or implementation reliance.
  - Normalize the spec to approved before architecture reliance.
  - Record architecture and ADR decisions for validation idempotency cache-hit safety before planning.
  - Record architecture-review R1 approval before execution planning reliance.
  - Create a living execution plan before plan-review, test-spec, and implementation.
  - Record plan-review R1 approval before test-spec reliance.
  - Create an active test spec before implementation.
  - Implement M1 cache identity primitives and local cache eligibility without enabling validator cache skips.
tests:
  - Proposal-review R1 found VIC-PR1 through VIC-PR5 and required first-slice scope, cache evidence, first validator, implementation manifest, and closeout enforcement clarification.
  - Proposal revision accepts all five proposal-review findings.
  - Proposal revision resolves first-slice open questions for formal cache-hit evidence file, implementation manifest, closeout rejection ownership, and local cache lifetime.
  - Proposal-review R2 approves the revised proposal with no material findings.
  - Spec authoring records requirements for explicit-path lifecycle cache eligibility, cache keys, input surfaces, implementation manifests, change-local cache evidence, closeout enforcement, local cache lifetime, measurement, compatibility, and Workstream B exclusion.
  - Spec-review R1 found VIC-SR1 through VIC-SR3 and required command/path normalization, change metadata evidence shape, and measurement evidence location clarification.
  - Spec revision accepts and resolves VIC-SR1 through VIC-SR3 with deterministic command/path normalization, compact schema_version 2 evidence-kind metadata, and durable measurement evidence at validation-cache-measurement.yaml.
  - Spec-review R2 approves the revised spec with no material findings.
  - Architecture records local-only validation execution cache state, formal cache-hit evidence, closeout actual-run gates, Workstream A measurement, and Workstream B deferral.
  - ADR records the durable validation cache-hit safety decision for unchanged explicit-path lifecycle validation inputs.
  - Architecture-review R1 approves the canonical architecture update and ADR with no material findings.
  - Plan sequences implementation into cache primitives, lifecycle cache integration, metadata closeout enforcement, measurement/routing, and lifecycle closeout.
  - Plan-review R1 approves the execution plan with no material findings.
  - Test spec maps approved requirements, examples, edge cases, and plan milestones to concrete test cases.
  - M1 unit tests cover first-slice cacheable command-family detection, deterministic argv hashing, explicit-path order, duplicate path rejection, unsafe path rejection, input-surface manifests, implementation manifests, policy manifests, and branch/worktree/change-local cache eligibility.
  - M1 selector regression covers deterministic routing for validation cache helper and test script changes.
  - Code-review M1 R1 records one material finding requiring review-resolution for unresolved implementation-manifest handling.
  - Review-resolution for code-review M1 R1 resolves unresolved implementation-manifest handling and returns M1 to code-review.
  - Artifact lifecycle validation covers the revised proposal and change-local review records.
  - Review-artifact validation covers the recorded proposal-review R1 findings and dispositions.
  - Change metadata validation covers this change-local metadata.
