requirements:
  - Make workflow-managed milestone reviews route to the next in-scope implementation milestone until all implementation milestones are closed.
  - Preserve static-only first-slice proof without executable plan-state validation.
  - Record and resolve plan-review finding PLR1-F1 before downstream test-spec or implementation relies on the affected validation commands.
  - Map every approved milestone-aware handoff requirement, example, edge case, security/privacy expectation, and compatibility claim to concrete static or manual proof before implementation.
  - Add M1 static proof surfaces before canonical workflow and skill guidance edits.
  - Align authoritative workflow specs so clean non-final milestone reviews route to the next in-scope implementation milestone, while clean final milestone reviews route to verify only after all in-scope implementation milestones are closed.
  - Preserve same-milestone review-resolution, `resolution-needed`, ambiguous-plan, and lifecycle-closeout boundaries in authoritative workflow contracts.
  - Align contributor workflow guidance and authored stage skills so implement, code-review, plan, and workflow orchestration use the approved milestone-aware handoff loop.
  - Keep generated skill mirrors and public adapter output derived for the later generated-output milestone.
tests:
  - Plan-review evidence that selector blocks directory path `dist/adapters` in explicit mode.
  - Selector validation for concrete generated adapter skill file paths.
  - Review artifact structure validation for plan-review finding PLR1-F1.
  - Active test spec for milestone-aware review handoff requirement, example, edge case, security/privacy, performance, and compatibility coverage.
  - Skill-validator static proof for approved milestone state vocabulary plus pending red-state checks for M2/M3 guidance alignment.
  - Skill-validator static proof that authoritative workflow specs remove the unconditional clean-review-to-verify shortcut and contain milestone-aware routing terms.
  - Skill-validator static proof that authored workflow guidance and stage skills remove stale clean-review-to-verify shortcuts and include milestone-aware state, handoff, current handoff summary, and lifecycle-closeout terms.
