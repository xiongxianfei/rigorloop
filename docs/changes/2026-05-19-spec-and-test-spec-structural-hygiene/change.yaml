requirements:
  - Preserve every skill-contract R-clause ID, clause text, and clause order while adding navigation structure.
  - Preserve every acceptance criterion text and position within its slice.
  - Preserve every skill-contract test-spec test-case ID, body, fixture, and coverage mapping.
  - Keep spec and test-spec structural grouping coupled in one amendment.
  - Record proposal-review approval before spec amendment relies on the proposal.
  - Normalize the approved proposal to accepted before relying on it for the spec amendment.
  - Draft the skill-contract structural hygiene amendment before spec-review.
  - Record spec-review approval before downstream planning or test-spec work relies on the draft spec amendment.
  - Normalize the approved spec status before planning relies on it.
  - Create an active execution plan and synchronize `docs/plan.md`.
tests:
  - Proposal-review clean receipt and review-log validation.
  - Artifact lifecycle validation for the proposal and review evidence.
  - Whitespace validation for the proposal-stage artifacts.
