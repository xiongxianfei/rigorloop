requirements:
  - Record merged M3 plan state after PR #56.
  - Record M4 spec as a follow-on artifact of the accepted cost-bounded-rigor proposal.
  - Author focused M4 lifecycle token-cost summary spec before spec-review.
  - Keep lifecycle token-cost summaries conditional, diagnostic, and warning-only.
  - Define required lifecycle summary triggers without making ordinary small changes report by default.
  - Define required lifecycle summary field groups and advisory numeric fields.
  - Preserve release token-friendliness reports as separate release evidence.
  - Preserve single-authored skill source and follow-up ownership boundaries.
  - Avoid hard token gates, dynamic benchmark expansion, release packaging changes, adapter packaging changes, and progressive-loading restructuring.
  - Record clean spec-review before downstream plan reliance.
  - Normalize the approved M4 spec status before downstream plan reliance.
  - Create an active M4 plan before plan-review.
  - Register the active M4 plan in docs/plan.md.
  - Record clean plan-review before test-spec authoring.
  - Create active M4 test spec before implementation.
  - Keep implementation blocked until maintainer approves the active M4 test spec.
  - Record maintainer approval of the active M4 test spec before implementation.
  - Add lifecycle token-cost summary guidance to docs/workflows.md.
  - Add a reusable lifecycle token-cost summary template.
  - Add the first M4 lifecycle token-cost summary because the active plan classifies M4 as a large workflow-governance change.
  - Add stable static proof for required lifecycle-summary field groups and warning-only hard-gate boundaries.
  - Record no-change rationale for selector, release, benchmark, adapter, generated-output, and progressive-loading surfaces.
  - Record durable explain-change rationale before verify.
  - Run final local verify before PR handoff.
  - Open PR for human review and record the PR handoff state.
  - Observe hosted CI status after PR handoff.
