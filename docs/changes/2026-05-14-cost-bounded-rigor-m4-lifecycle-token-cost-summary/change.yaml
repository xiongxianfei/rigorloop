  - Plan index validation.
  - Clean plan-review receipt and review-log validation.
  - M4 test spec artifact lifecycle validation.
  - M4 test spec approval validation.
  - Lifecycle summary template static proof.
  - M4 lifecycle summary static proof.
  - Token-cost report validation regression suite.
  - M1 selected CI for workflow guidance, template, lifecycle summary, token-cost tests, plan, plan index, and change metadata.
  - Explain-change lifecycle and change metadata validation.
  - Final local verify selected CI and branch-ready validation.
  - PR handoff lifecycle state-sync validation.
  - Hosted CI status check and lifecycle state-sync validation.
