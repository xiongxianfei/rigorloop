change_id: 2026-05-19-assets-first-progressive-disclosure-pilot-published-skills
title: Assets-first progressive disclosure pilot for published skills
classification: proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-19-assets-first-progressive-disclosure-pilot-published-skills.md
  spec: specs/skill-contract.md
  test_spec: specs/skill-contract.test.md
  plan: docs/plans/2026-05-19-assets-first-progressive-disclosure-pilot-published-skills.md
  review_resolution: docs/changes/2026-05-19-assets-first-progressive-disclosure-pilot-published-skills/review-resolution.md
requirements:
  - Record the assets-first progressive-disclosure pilot proposal as a draft proposal artifact.
  - Preserve the pilot as a follow-on asset pilot unless specs/skill-contract.md is explicitly amended and approved.
  - Keep lifecycle-sensitive handoff rules in SKILL.md or governing workflow artifacts, not hidden in assets.
  - Define whether the plan skeleton asset is the reviewed equivalent output template or only a substructure helper.
  - Bound asset validation oracles to deterministic checks, declared heuristics, fixture evidence, or code-review judgment.
  - Record spec input answers for token budget, exact asset count, normative asset status, resource-map verb, and asset metadata policy.
  - Record spec input answers for improvement proof, structural drift detection, follow-on pattern selection, and behavior-parity corpus selection.
  - Amend specs/skill-contract.md with the assets-first plan pilot contract before planning or implementation.
  - Create an execution plan that sequences R37 through R45 into reviewable implementation milestones.
  - Amend specs/skill-contract.test.md so R37 through R45 map to concrete tests before implementation.
  - Keep docs/plan.md synchronized with the active plan body when the initiative starts.
tests:
  - Proposal lifecycle validation for the draft proposal artifact.
  - Formal proposal-review recording validation for APD-PR1 through APD-PR4.
  - Spec lifecycle validation for the draft specs/skill-contract.md amendment.
  - Test-spec coverage for R37 through R45 assets-first plan pilot requirements.
  - M1 validator fixtures for valid and invalid assets-first plan pilot resources.
  - Plan lifecycle validation for the active plan and plan index.
  - Whitespace validation for the proposal and change-local artifacts.
