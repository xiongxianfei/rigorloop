change_id: 2026-05-12-review-skill-recording-output-guardrail
title: Review skill recording and status output guardrail
classification: workflow-governance-proposal
risk: medium
architecture:
  status: no-impact
  rationale: The approved amendment changes the formal review output contract, canonical review skill wording, and validation expectations, but it does not introduce a new runtime component, data flow, generated-output flow, adapter packaging rule, deployment boundary, trust boundary, or durable architecture decision. Existing architecture already covers canonical skill sources, generated mirrors/adapters, review artifacts, and repository-owned validation.
artifacts:
  proposal: docs/proposals/2026-05-12-review-skill-recording-output-guardrail.md
  spec: specs/formal-review-recording.md
  review_resolution: docs/changes/2026-05-12-review-skill-recording-output-guardrail/review-resolution.md
requirements:
  - Preserve stage-neutral review recording across proposal-review, spec-review, architecture-review, plan-review, and code-review.
  - Make review recording status explicit in formal review skill output.
  - Make artifact-status sync explicit for approving and clean formal review results.
  - Define formal review output recording/status-sync behavior in the governing spec before skill implementation.
  - Preserve clean no-material review lightweight behavior.
  - Record material proposal-review findings before review-driven proposal fixes.
tests:
  - Proposal-review material finding record and resolution evidence.
  - Change metadata validation.
  - Review artifact structural validation.
  - Markdown whitespace validation.
  - Proposal-review rerun for the status-sync scope expansion.
  - Spec-review for the formal review recording/status-sync amendment.
  - No-architecture-impact rationale.
