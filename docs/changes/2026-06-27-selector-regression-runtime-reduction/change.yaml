requirements:
  - Record the selector-regression runtime reduction proposal before proposal-review.
  - Review the proposal for problem clarity, option quality, scope control, risk honesty, vision fit, and readiness for spec.
  - Normalize proposal status to accepted before downstream spec reliance.
  - Author a focused selector-regression runtime reduction spec from the accepted proposal.
  - Review the spec before planning relies on it.
  - Normalize spec status to approved before plan reliance.
  - Record architecture as not required unless implementation expands into persistent workers, shared caches, broad validator composition, or new cross-process execution protocols.
  - Author a living execution plan before plan-review.
  - Author a traceable test specification after plan-review and before implementation.
  - Record selector-regression baseline runtime, profile, and preservation evidence before runtime-reducing changes.
  - Register selector-regression runtime evidence files so they do not create manual-routing debt.
  - Reduce pure selector test duplicate work by reusing complete repository preflight identity without moving required coverage out of the default command.
  - Record revised selector-regression runtime evidence, selected-CI timeout status, and preservation result.
  - Keep broad-smoke duration diagnostics non-negative while preserving sequential broad-smoke execution.
tests:
  - Proposal-review approves the proposal or records material findings before downstream spec reliance.
  - Review-log indexes proposal-review receipts with zero material findings when clean.
  - Spec-review approves the selector-regression runtime reduction spec or records material findings before plan reliance.
  - The execution plan records milestones, validation commands, recovery paths, dependencies, current handoff state, and readiness before plan-review.
  - The test specification maps selector-regression runtime reduction requirements, examples, edge cases, and milestones to concrete tests before implementation.
  - Selector-regression runtime evidence files route as registered change evidence without manual-routing debt.
  - Selector-regression baseline/profile/preservation evidence exists before runtime-reducing changes.
  - Shared selector preflight context rejects mismatched repository roots and preserves default selector-regression coverage.
  - Revised selector-regression runtime result records median reduction and selected-CI timeout status.
  - CI duration reporting does not use Bash SECONDS and cannot emit negative broad-smoke elapsed output.
