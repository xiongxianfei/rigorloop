  plan: docs/plans/2026-05-23-public-discovery-and-developer-adoption-surface.md
requirements:
  - Improve public discovery and first-contact developer adoption without changing runtime behavior, workflow semantics, skills, adapters, validators, or release mechanics.
  - Keep GitHub metadata, README first-screen clarity, Quick Start freshness, visual explanation, contribution routing, and package metadata in the first-slice decision space.
  - Defer off-platform promotion until the repository landing surface passes cold-read review.
  - Record proof for external GitHub metadata, Quick Start version sync, README ownership boundaries, and cold-read/link-check evidence before implementation closeout.
  - Preserve the approved README positioning contract while adding public discovery, repository metadata, npm landing, and adoption-evidence requirements.
tests:
  - Proposal-review clean receipt for revised proposal readiness.
  - Spec-review for public discovery and developer adoption requirements.
  - Plan-review for the public discovery and developer adoption execution plan.
  - Plan-review rerun for the DXA-PLAN1 plan revision.
  - Plan-review confirmation for the current execution plan.
  - Test-spec coverage mapping for metadata, README, npm, proof artifacts, and no-runtime-change preservation.
  - M1 baseline proof for repository metadata, version sync, README ownership, stale versions, unsupported claims, and no live metadata mutation.
  - Code-review M1 clean receipt for baseline proof.
  - Code-review M1 repeat clean receipt for baseline proof.
  - M2 README first-contact adoption surface implementation with updated proof artifacts.
  - Code-review M2 clean receipt for README first-contact adoption surface.
  - Code-review M2 repeat clean receipt for README first-contact adoption surface.
  - M3 npm package landing alignment with updated package metadata, package README, and proof artifacts.
  - Code-review M3 clean receipt for npm package landing alignment.
  - Code-review M3 repeat clean receipt for npm package landing alignment.
  - M4 live GitHub repository metadata mutation and after-state proof.
  - Code-review M4 clean receipt for external GitHub metadata mutation and proof.
  - Code-review M4 repeat clean receipt for external GitHub metadata mutation and proof.
  - M5 lifecycle closeout implementation with durable explain-change rationale and final milestone validation evidence.
  - Code-review M5 clean receipt for lifecycle closeout evidence.
  - Explain-change durable rationale refreshed from the actual diff, requirements, plan milestones, validation evidence, and review outcomes.
  - Final verify report proving branch-ready status for PR handoff.
  - Review artifact validation for clean formal review recording.
  - Change metadata validation for the proposal, spec, and plan record root.
  - Artifact lifecycle validation for the proposal, spec, test spec, plan, plan index, and review record root.
  - Whitespace validation for the proposal, spec, test spec, plan, plan index, and review artifacts.
