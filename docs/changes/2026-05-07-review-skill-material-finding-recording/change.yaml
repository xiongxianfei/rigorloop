change_id: 2026-05-07-review-skill-material-finding-recording
title: Review skill material finding recording
classification: workflow-governance-spec
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-07-review-skill-material-finding-recording.md
  spec: specs/formal-review-recording.md
  plan: docs/plans/2026-05-07-review-skill-material-finding-recording.md
  test_spec: specs/formal-review-recording.test.md
  review_resolution: docs/changes/2026-05-07-review-skill-material-finding-recording/review-resolution.md
requirements:
  - Decouple isolated review handoff from material-finding recording across formal review skills.
  - Preserve material isolated-review findings before review-driven tracked artifact edits begin.
  - Resolve proposal-review findings RSV1 through RSV7 before downstream spec work relies on the proposal.
  - Preserve spec-review finding SR1 before review-driven spec edits proceed.
  - Preserve spec-review findings SR2 and SR3 before follow-up spec or governance edits proceed.
  - Resolve SR2 under the final simplified material-finding recording rule selected by the owner.
  - Resolve SR3 by aligning governance and operational guidance with the final simplified material-finding recording rule.
  - Resolve SR4 by simplifying the rule to every material finding requiring change-local review files.
  - Create the execution plan and plan-index entry for the review skill material-finding recording implementation.
  - Update the matching test specs after clean plan-review so implementation starts from a concrete proof map.
  - Make future review-resolution records scan-first for humans while preserving validator-readable finding fields.
  - Draft spec amendments for the shared formal review skill subsection and structural validation rule.
  - Draft workflow-level alignment for isolated review output, tracked artifacts, and readable review-resolution records.
tests:
  - Review artifact structure validation for the proposal-review finding record.
  - Review artifact closeout validation after accepted proposal-review finding fixes.
  - Review artifact structure validation after recording spec-review finding SR1.
  - Artifact lifecycle validation for the revised proposal and review artifacts.
  - Proposal-level validation for the review-resolution readability amendment.
  - Artifact lifecycle validation for the accepted proposal and draft spec amendments.
  - Selector-selected CI for the proposal, spec amendments, and change-local review artifacts.
  - Review artifact structure validation after recording spec-review findings SR2 and SR3.
  - Review artifact closeout validation after resolving spec-review findings SR2 and SR3.
  - Lifecycle and selected CI validation for governance, workflow, spec, and review-artifact alignment.
  - Review artifact structure validation after recording spec-review finding SR4.
  - Review artifact closeout validation after resolving spec-review finding SR4.
  - Lifecycle and selected CI validation after simplifying the material-finding recording trigger.
  - Plan and lifecycle validation after creating the active execution plan.
  - Test-spec proof maps for shared review skill guidance, isolated material output, broad material-finding recording, scan-first review-resolution, generated-output drift, and structural-only validator scope.
  - Skill-validator regression coverage for the canonical shared review recording block, byte-equality copies, broad material-finding rule, and governance wording.
  - Review-artifact validator regression coverage for scan-first review-resolution closeout, parseable per-finding labels, and the reusable review-resolution template.
  - Generated skill and adapter drift checks after canonical review skill updates.
