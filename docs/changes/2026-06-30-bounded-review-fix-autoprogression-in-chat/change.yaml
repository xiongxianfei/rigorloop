requirements:
  - Record a proposal for bounded review-fix autoprogression before downstream spec work.
  - Review the proposal for scope, target-stage enum, loop budget, and readiness for spec.
  - Resolve proposal-review material findings before downstream spec reliance.
  - Author the review-fix autoprogression spec from the accepted proposal.
  - Record the architecture decision and canonical architecture update for the bounded review-fix profile.
  - Create an execution plan for implementation milestones, validation, recovery, and handoff.
  - Create a matching test spec before implementation and before test-spec-review.
tests:
  - Proposal-review records material findings before proposal revision.
  - Review-resolution records dispositions for material findings.
  - Artifact lifecycle validation covers the revised proposal.
  - Artifact lifecycle validation covers the approved spec.
  - Architecture lifecycle validation covers the canonical package update and ADR.
  - Plan lifecycle validation covers the active plan and plan index.
  - Test-spec lifecycle validation covers the active test spec.
  - Review-fix change metadata validation covers the nested profile state shape, closed vocabularies, required fields, terminal transitions, and direct-review isolation.
  - Review-fix artifact lifecycle validation covers route evaluation, preflight stops, target bounds, direct-review isolation, architecture assessment, and terminal state transitions.
  - Review-fix review artifact validation covers driver-owned classifications, auto-applied dispositions, same-review rerun linkage, stale evidence, generated-owner stops, exact reviewer wording, non-auto-safe blockers, and budget exhaustion.
