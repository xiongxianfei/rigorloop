requirements:
  - Record the proposal direction for review-family material-finding and result-skeleton assets.
  - Preserve review behavior, status enums, recording rules, and lifecycle boundaries while extracting field-shape assets.
  - Keep review-class assets limited to structural field shape and placeholders.
  - Bind material-finding assets to the review-artifact parser contract and validate representative valid and invalid fills.
  - Record first-slice boundaries and deferred follow-ons for remaining review skills, build-time partials, and referential-integrity validation.
  - Create a draft feature spec that converts the accepted proposal direction into testable review-family asset requirements.
  - Resolve spec-review finding RSF-SR1 before downstream reliance on the spec.
  - Keep RSF-SR1 resolution narrow by preserving current parser behavior and excluding severity-enum validation from this slice.
  - Create an execution plan that sequences validator foundation, per-skill asset conformance, generated-output proof, token and cold-read evidence, and lifecycle closeout.
  - Record clean plan-review approval before test-spec.
  - Create an active test spec that maps every approved review-family requirement, example, edge case, and acceptance criterion to proof before implementation.
  - Implement M1 validator foundation and record that `specs/skill-contract.md` is sufficient before review-skill asset edits.
  - Resolve code-review M1 finding RSF-M1-CR1 before starting M2.
  - Rerun code-review M1 after resolving RSF-M1-CR1.
  - Close M1 only after clean code-review rerun and hand off to M2.
  - Implement M2 by adding `code-review` review-family assets, resource-map entries, focused validator coverage, and preservation evidence.
  - Close M2 only after clean code-review and hand off to M3.
tests:
  - Proposal-review checks problem framing, option quality, scope boundaries, vision fit, risks, and readiness for spec.
  - Review artifact structure validation for clean proposal-review receipt.
  - Artifact lifecycle validation for the proposal and review evidence.
  - Artifact lifecycle validation for the draft spec.
  - Review artifact closeout validation for resolved spec-review finding RSF-SR1.
  - Focused text inspection proving RSF-R20, RSF-R21, EC2, and AC-RSF-010 no longer require non-enum severity values to fail structure validation.
  - Plan-review must approve the execution plan before test-spec or implementation.
  - Review artifact closeout validation for clean plan-review receipt.
  - Test-spec coverage maps requirements, examples, edge cases, validation commands, fixtures, manual proof, compatibility, and lifecycle checks before implementation.
  - M1 validator fixture coverage rejects review-family asset contract drift and review-artifact parser fixtures prove parser-owned identity behavior without severity-enum validation.
  - Code-review M1 must confirm the non-enum severity proof is non-vacuous before M1 can close.
  - RSF-M1-CR1 resolution updates the non-enum severity test so the fixture contains a real Severity field before validation.
  - Code-review M1 rerun confirms M1 is clean after RSF-M1-CR1 resolution.
  - Code-review M2 validator coverage confirms `code-review` asset presence and status vocabulary preservation.
  - Code-review M2 clean review confirms code-review asset extraction is structurally safe.
