  plan: docs/plans/2026-05-25-installed-skill-artifact-placement-contract.md
requirements:
  - Record the proposal direction for installed-skill artifact placement self-containment before spec authoring.
  - Preserve the proposal-review observations for spec authoring without treating them as material findings.
  - Author the installed-skill artifact placement contract spec before spec-review.
  - Settle the approved spec before planning relies on it.
  - Create an active execution plan and register it in the plan index before plan-review.
  - Create an active test spec mapping approved requirements, examples, edge cases, and milestones before implementation.
  - Keep the next stage isolated until the user requests implementation.
  - Add M1 validator helper coverage for first-slice installed-skill placement paths, pre-change-pack behavior, isolated advisory behavior, workflow-map drift, and plan-surface disambiguation.
tests:
  - Proposal-review clean receipt is recorded in the change-local review log.
  - Proposal-review follow-up receipt confirms prior observations are resolved for proposal-stage readiness.
  - Spec-review clean receipt approves the draft spec for downstream planning.
  - Plan artifact sequences validator coverage, skill/workflow wording, and generated-output proof.
  - Plan-review clean receipt approves the execution sequence before test-spec.
  - Test spec maps R1-R30, examples, edge cases, and plan milestones to concrete proof surfaces before implementation.
  - M1 skill-validator helper tests cover compliant and negative placement contract fixtures, workflow-map drift, and plan-surface ambiguity.
  - Code-review-m1-r1 records SAP-M1-CR1 against incomplete stage-owned record-type helper coverage.
  - SAP-M1-CR1 resolution adds stage-owned record-type validation and wrong-stage negative fixtures before rerun code-review.
  - Code-review-m1-r2 closes M1 after confirming SAP-M1-CR1 is resolved.
  - M2 canonical skill wording exposes proposal-review and spec-review placement contracts, plan-surface distinctions, and workflow-guide fallback behavior.
  - M2 skill validation wires first-slice placement checks into canonical skill validation after public skill text is updated.
  - Code-review-m2-r1 records SAP-M2-CR1 against stale plan readiness footer state after the M2 handoff.
  - SAP-M2-CR1 resolution synchronizes the plan readiness footer and returns M2 to rerun code-review.
  - Code-review-m2-r2 records manual approval for M2 and closes M2.
  - M3 generated-output proof validates v0.1.5 adapter archives from canonical skills.
  - M3 cold-read proof answers proposal-review placement, spec-review pre-change-pack placement, and plan-surface questions from installed skill text.
  - Artifact lifecycle validation covers the accepted proposal and draft spec.
  - Review artifact validation covers the clean review receipt root.
  - Artifact lifecycle validation covers the proposal and change-local review artifacts.
