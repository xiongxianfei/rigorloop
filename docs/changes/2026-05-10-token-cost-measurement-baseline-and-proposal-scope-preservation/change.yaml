requirements:
  - Define a proposal direction for token-cost measurement baseline and proposal scope preservation.
  - Record material proposal-review findings before proposal revision.
  - Resolve proposal-review findings before downstream spec authoring relies on the proposal.
  - Record proposal-review R2 approval before downstream spec authoring relies on the proposal.
  - Normalize the accepted proposal before drafting the spec.
  - Draft the token cost measurement baseline and proposal scope preservation spec before planning or implementation.
  - Record spec-review R1 approval before architecture, planning, test-spec, or implementation relies on the spec.
  - Normalize the approved spec before architecture relies on it.
  - Update the canonical architecture package for durable report and measurement-script surfaces.
  - Record no-ADR-required rationale for the architecture update.
  - Record architecture-review R1 approval before planning relies on the canonical architecture update.
  - Create an active execution plan before test-spec or implementation.
  - Add the active plan to docs/plan.md.
  - Record plan-review R1 approval before test-spec relies on the plan.
  - Create an active test spec before implementation.
  - Update the active plan handoff state for implement M1 after test-spec creation.
  - Implement M1 static skill measurement and Codex JSONL analyzer commands before baseline report generation.
  - Keep M1 token-cost thresholds warning-only and avoid hosted telemetry, hard CI gates, or live command wrapping.
  - Hand off M1 to code-review only after targeted validation passes and the plan state is updated to review-requested.
  - Close M1 only after code-review completes cleanly or material findings are resolved or explicitly dispositioned.
  - Produce the first durable token-cost baseline report under docs/reports/token-cost/.
  - Link the baseline report from change-local evidence instead of duplicating the report body.
  - Update proposal skill guidance so broad or multi-part requests preserve every initial user goal with a visible treatment.
  - Update proposal-review guidance so silent narrowing returns changes-requested without making proposal-review rewrite the proposal.
  - Add narrow static validation coverage for proposal scope preservation and silent-narrowing review checks.
tests:
  - Proposal-review artifact record for material findings.
  - Review artifact structure validation while proposal-review findings remain open.
  - Review artifact closeout validation after proposal-review R2 approval.
  - Artifact lifecycle validation after spec draft.
  - Spec-review R1 approval record and review artifact closeout validation.
  - Canonical architecture package lifecycle validation after architecture update.
  - Architecture-review R1 approval record and review artifact closeout validation.
  - Artifact lifecycle validation after plan creation.
  - Plan-review R1 approval record and review artifact closeout validation.
  - Test-spec requirement, example, edge-case, and milestone coverage before implementation.
  - Artifact lifecycle and change metadata validation after test-spec creation.
  - M1 focused token-cost measurement script tests.
  - M1 direct static skill measurement command.
  - M1 direct Codex JSONL analyzer command against a small fixture.
  - Selector check recorded as manual routing for new script paths, plus selected lifecycle/change metadata checks.
  - M1 code-review validation rerun and clean no-material review closeout.
  - M2 baseline report shape and change-local link test.
  - M2 report lifecycle and change metadata validation.
  - M3 proposal/proposal-review scope preservation static validation.
  - M3 skill structure validation.
