  plan: docs/plans/2026-06-25-independent-adversarial-review-gates.md
  test_spec: specs/review-independence-and-criticality.test.md
  review_resolution: docs/changes/2026-06-25-independent-adversarial-review-gates-for-automated-workflows/review-resolution.md
  explain_change: docs/changes/2026-06-25-independent-adversarial-review-gates-for-automated-workflows/explain-change.md
  verify_report: docs/changes/2026-06-25-independent-adversarial-review-gates-for-automated-workflows/verify-report.md
requirements:
  - Normalize the proposal to accepted after approved proposal-review with no material findings.
  - Record proposal-review R1 as durable formal review evidence.
  - Author a review-independence and criticality spec from the accepted proposal and proposal-review directives.
  - Define normalized review gate outcome, verifiable initial-packet evidence, exact L1/L2/L3 requirements, second-review disagreement behavior, and rollout sampling floors.
  - Resolve SR1-F1 by defining stop-outcome routing semantics for native changes-requested.
  - Record the durable architecture for independent adversarial automated review gates.
  - Create a milestone execution plan for the first implementation slice.
  - Author the matching test spec before implementation.
  - Add structured automated review gate evidence validators for manifests, initial packets, phase receipts, clean-review sufficiency receipts, and bounded private-reasoning-safe fields.
  - Update canonical review and workflow skills for the code-review independent adversarial review pilot and Phase 1 manifest-only spec-review/plan-review guidance.
tests:
  - Proposal-review R1 is recorded with approved status and no material findings.
  - Proposal status is normalized from draft to accepted before downstream spec reliance.
  - Spec contains required spec sections and stable requirements ready for spec-review.
  - Artifact lifecycle validation accepts the accepted proposal and approved spec.
  - `changes-requested` routing semantics preserve existing authorized code-review review-resolution routing while pausing unroutable review stages.
  - Architecture records orchestrator-owned manifests, blind-first evidence staging, risk-tiered escalation, second-review disagreement handling, calibration, and final holistic review.
  - Plan sequences evidence validation, workflow routing, code-review pilot guidance, calibration, and final proof before implementation.
  - Plan-review R1 is recorded with one material finding requiring generated adapter archive proof commands before test-spec.
  - PR1-F1 is resolved by adding adapter archive proof commands to M3, M5, and the top-level validation plan.
  - Plan-review R2 approves the revised plan with no material findings.
  - Test spec maps approved requirements, examples, edge cases, architecture boundaries, and plan milestones to concrete proof cases.
  - Review artifact validator accepts valid automated review gate evidence and rejects L0 handoff, same-context IDs, incomplete packet evidence, forbidden initial context, bad phase order, unbounded prose fields, and incomplete clean sufficiency receipts.
  - Change metadata validator accepts structured review gate metadata and rejects L0, missing or malformed packet hashes, and bad phase receipt order.
  - Code-review M1 R1 records material findings for native review result evidence and T1 independence matrix proof gaps.
  - CR1-F1 is resolved by requiring native review status evidence and rejecting native/derived status mismatches.
  - CR1-F2 is resolved by adding T1 L1/L2/L3 valid fixtures and invalid independence/context identity fixtures.
  - Code-review M1 R2 records a material finding for unsupported native review status values advancing cleanly.
  - CR2-F1 is resolved by failing closed on unsupported native review status values and adding unknown-value proof.
  - Code-review M1 R3 approves the M1 review-resolution with no material findings.
  - Add workflow-state evaluation for normalized automated review gate routing, routable changes-requested, second-review disagreement, and final holistic review preconditions.
  - Code-review M2 R1 records a material finding for clean-status evidence failures rejecting the required inconclusive gate outcome.
  - CR3-F1 is resolved by splitting determinate native mappings from clean native gate-derived outcome logic.
  - Code-review M2 R2 approves the CR3-F1 resolution with no material findings.
  - Skill validator covers automated code-review blind-first pilot guidance, workflow/implement routing guidance, manifest-only authoring review guidance, no reviewer edit authority, no finding quota, and direct isolated review compatibility.
  - Canonical skill validation, generated local skill checks, and public adapter archive proof pass after M3 canonical skill changes.
  - Code-review M3 R1 records material findings for incomplete `failed-remediation` guidance and missing `auto-fix eligibility` exclusion in implement handoff guidance.
  - CR4-F1 and CR4-F2 are resolved by adding R8d/R5 skill guidance and enumeration-driven phrase assertions.
  - Code-review M3 R2 approves the M3 review-resolution with no material findings.
  - Calibration record validation covers sampling floors, second-review disagreement, downstream escape records, metric separation by review skill and risk tier, and public fixture corpus scope.
  - Lifecycle routing rejects standard-risk rollout sampling below 20%, early sample-rate reduction before 10 independently reviewed clean outcomes, and elevated-risk clean reviews without second review.
  - Behavior-preservation evidence records that M4 does not change manual/profile-off review behavior or introduce a finding quota.
  - Code-review M4 R1 records material findings for missing critical-risk L3/human authority proof and unsupported calibration yes/no control values.
  - CR5-F1 is resolved by requiring explicit critical-authority kind and satisfaction evidence for critical-internal and irreversible-external-action clean reviews.
  - CR5-F2 is resolved by rejecting unsupported calibration yes/no control values before branch consumers read them.
  - Code-review M4 R2 records a material finding for unsupported critical authority kinds being masked by outcome mismatch when `advance` is supplied.
  - CR6-F1 is resolved by returning critical-authority parser failures before gate-state derivation or supplied-outcome consistency checks.
  - Code-review M4 R3 approves the M4 review-resolution with no material findings.
  - M5 aligns contributor workflow guidance with the independent adversarial code-review gate and final holistic review precondition.
  - Code-review M5 R1 records a material finding for M5 behavior-preservation evidence being scoped under an M4-only header.
  - CR7-F1 is resolved by updating behavior-preservation metadata to cover both M4 and M5 evidence.
  - Code-review M5 R2 approves the final holistic implementation diff with no material findings.
  - Explain-change records the trace from proposal, spec, architecture, plan, tests, review findings, and validation evidence to the final diff.
  - Verify records branch-ready local validation evidence and routes next stage to PR handoff.
