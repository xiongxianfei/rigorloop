change_id: 2026-05-26-ci-maintenance-skill-rename-and-workflow-authoring
title: CI-maintenance skill rename and workflow authoring support
classification: proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-26-ci-maintenance-skill-rename-and-workflow-authoring.md
  spec: specs/ci-maintenance-skill.md
  plan: docs/plans/2026-05-26-ci-maintenance-skill-rename-and-workflow-authoring.md
  test_spec: specs/ci-maintenance-skill.test.md
requirements:
  - Record the proposal direction for renaming the CI skill to ci-maintenance before spec authoring.
  - Preserve proposal-review findings and observations for downstream spec authoring.
  - Author the ci-maintenance skill identity and workflow authoring contract before spec-review.
  - Keep post-spec downstream work isolated until the user explicitly requests the next stage.
  - Create an execution plan that sequences the approved spec into reviewable implementation milestones before test-spec.
  - Create a traceable test spec that maps requirements, examples, edge cases, and acceptance criteria before implementation.
tests:
  - Proposal-review-r1 records the material findings that drove proposal revision.
  - Review-resolution records accepted dispositions for proposal-review-r1 findings.
  - Proposal-review-r2 records approved-with-observations readiness for spec.
  - Spec records hard rename behavior for the first slice after checking current alias support.
  - Spec records fail-safe risk-map behavior for unmapped changed surfaces.
  - Spec-review-r1 records material findings before downstream planning relies on the draft spec.
  - Spec-review-r2 records clean approval after spec revision.
  - Plan records architecture as intentionally not required, sequences plan-review before test-spec, and keeps implementation blocked until test-spec.
  - Plan-review-r1 records clean approval before test-spec authoring.
  - Test spec maps the approved requirements to deterministic unit, integration, migration, manual, and smoke proof.
  - Code-review-m1-r1 records clean approval of the canonical skill rename and packaged resources.
  - M2 adds deterministic validator coverage for ci-maintenance front matter, stale identifiers, resources, skeleton defaults, risk-map boundaries, command blockers, and workflow-review guardrails.
  - Code-review-m2-r1 records clean approval of validator and fixture coverage.
  - M3 updates tracked adapter metadata, adds adopter-facing migration guidance, and records generated adapter archive proof for ci-maintenance resources.
  - M3 preserves generated non-Codex adapter validation for transformed front matter while keeping canonical ci-maintenance metadata required.
  - Code-review-m3-r1 records clean approval of generated adapter proof and migration evidence.
  - Artifact lifecycle validation covers the accepted proposal and review records.
