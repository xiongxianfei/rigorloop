requirements:
  - Record the proposal direction for normalizing `test-spec` to the published-skill design contract without changing behavior.
  - Resolve proposal-review findings TSCN-PR1, TSCN-PR2, TSCN-PR3, and TSCN-PR4 before downstream plan reliance.
  - Amend the skill contract for the discovered front-matter metadata contract gap before implementation.
  - Create an active execution plan that sequences proof planning, validator support, and skill normalization without starting implementation.
  - Add focused test-spec proof obligations for the test-spec normalization slice before validator or skill-body implementation.
  - Record owner approval for the focused test-spec amendment before M2 validator support begins.
  - Add or confirm deterministic validator support for test-spec normalization structural checks before canonical skill normalization.
  - Record clean M2 code-review before starting M3.
  - Normalize canonical `skills/test-spec/SKILL.md` while preserving rules, stop conditions, coverage obligations, and output obligations.
  - Record behavior-preservation and behavior-parity evidence for M3 before code-review.
  - Record clean M3 code-review before final closeout.
  - Record durable explain-change rationale before verify.
  - Pass final local verification before PR handoff.
  - Open PR handoff after branch-ready verification passes.
  - Keep family-wide readability, packaging, routing changes, and produced-artifact readability out of this proposal.
tests:
  - Artifact lifecycle validation for the proposal and change-local review artifacts.
  - Artifact lifecycle validation for the skill contract spec amendment.
  - Artifact lifecycle validation for the focused skill-contract test spec amendment.
  - Skill validator regression coverage for readability metadata, schema version, Workflow role fields, and output skeleton placeholders.
  - Code-review evidence for M2 validator and fixture support.
  - Skill validation and behavior-preservation evidence for canonical `test-spec` normalization.
  - Code-review evidence for M3 canonical skill normalization.
  - Durable explain-change rationale linking the diff to proposal, spec, plan, tests, reviews, and validation evidence.
  - Final local verification report before PR handoff.
  - PR handoff evidence.
  - Temporary adapter archive validation for generated-output proof from canonical skills.
  - Artifact lifecycle validation for the active plan and plan index.
  - Review artifact closeout validation for recorded proposal-review findings.
  - Change metadata validation for this change-local root.
