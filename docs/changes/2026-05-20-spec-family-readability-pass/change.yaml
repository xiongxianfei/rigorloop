requirements:
  - Record the proposal direction for improving spec-family skill readability without changing behavior.
  - Resolve proposal-review findings SFRP-PR1, SFRP-PR2, SFRP-PR3, SFRP-PR4, and SFRP-PR5 before downstream plan reliance.
  - Record owner decisions that section ordering aligns to the `spec` and `spec-review` family order and remains best effort when behavior clarity is at risk.
  - Record clean proposal-review R2 approval before downstream proposal reliance.
  - Settle the accepted proposal status before spec reliance.
  - Create a focused behavior contract for the spec-family readability pass before plan reliance.
  - Record clean spec-review approval before downstream plan reliance.
  - Create an active execution plan that sequences per-skill readability milestones before implementation.
  - Update the lifecycle plan index when the active plan is created.
  - Record clean plan-review approval before downstream test-spec reliance.
  - Create an active test spec that maps SFRP requirements, examples, and edge cases to deterministic preservation, parity, lifecycle, and generated-output checks before implementation.
  - Record owner approval of the active test spec before implementation.
  - Update the active plan and plan index so implementation relies on the active test spec.
  - Implement M1 by tabulating `skills/spec/SKILL.md` required-section guidance and centralizing changed closed enum values without behavior changes.
  - Update stale validation fixture expectations to accept the M1 settlement-result enum authority while preserving downstream status-settlement coverage.
  - Resolve `SFRP-M1-CR1` by making settlement-result fixture expectations skill-specific.
  - Record clean M1 code-review rerun and close M1 before beginning M2.
  - Record M1 content-preservation, enum authority, section-order, and representative behavior-parity evidence before code review.
  - Implement M2 by tabulating `skills/spec-review/SKILL.md` review-dimension guidance and centralizing review-dimension verdict values without behavior changes.
  - Record M2 content-preservation, enum authority, section-order, and representative behavior-parity evidence before code review.
  - Record code-review M2 R1 finding `SFRP-M2-CR1` before review-resolution or implementation fixes.
  - Keep produced-artifact readability, packaging, and duplicated-block resolution out of this proposal.
