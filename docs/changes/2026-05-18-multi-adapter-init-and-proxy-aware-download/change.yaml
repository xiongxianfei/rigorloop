requirements:
  - Define CLI init support for Codex, Claude Code, and opencode before implementation.
  - Preserve Codex installation under .agents/skills.
  - Define schema_version 2 lockfile behavior for mixed single-root and multi-root adapter entries.
  - Define proxy-safe diagnostics while deferring programmatic Undici proxy dispatcher support.
  - Preserve verified release archive and local archive trust boundaries.
  - Record adapter descriptor ownership, lockfile schema v2 serialization boundaries, and proxy diagnostic ownership in architecture before planning.
tests:
