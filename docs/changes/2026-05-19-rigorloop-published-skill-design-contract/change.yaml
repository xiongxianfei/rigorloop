requirements:
  - Preserve specs/skill-contract.md as the single normative skill-contract source.
  - Distinguish repository-root internal paths from packaged skill-local resources.
  - Keep first-slice audit scope from merging, retiring, renaming, or removing skills.
  - Define first-slice routing tests as description coverage and transcript-review evidence unless a dedicated harness exists.
  - Record spec-input answers for description length, workflow role scope, when_to_use, resource maps, pilot token budget, and merge/retire candidates.
  - Record proposal-review R2 approval before spec amendment relies on the proposal.
  - Settle the accepted proposal status before writing the spec amendment.
  - Amend specs/skill-contract.md instead of creating a competing skill-contract spec.
  - Record spec-review R1 approval before planning relies on the spec amendment.
  - Resolve spec-review R2 findings SKC-PR1 through SKC-PR4 before planning relies on the spec amendment.
  - Settle the approved spec status before the plan relies on R27 through R36.
  - Create an execution plan that keeps the published-skill design pilot audit-first and scoped to proposal, proposal-review, validator changes, and generated adapter validation for changed skills.
  - Record clean plan-review approval before test-spec relies on the plan.
  - Amend specs/skill-contract.test.md so R27 through R36 have concrete proof coverage before implementation starts.
  - Record owner approval of the active test spec before implement M1 relies on it.
  - Create M1 audit and evidence scaffold before validator or skill-body changes.
tests:
  - Proposal review artifact structure validation for recorded material findings.
  - Change metadata validation for the proposal-stage change-local pack.
  - Whitespace validation for the proposal and change-local artifacts.
  - Plan-stage artifact lifecycle and change metadata validation.
  - Plan-review artifact structure and closeout validation.
  - Test-spec coverage validation for published-skill design requirements R27 through R36.
  - Skill-validator regression alignment for approved baseline normalization terminology.
  - M1 evidence scaffold validation through change metadata, artifact lifecycle, selected CI, and whitespace checks.
