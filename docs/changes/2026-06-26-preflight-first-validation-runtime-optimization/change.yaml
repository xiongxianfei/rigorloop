requirements:
  - Record the validation-runtime optimization follow-on proposal before proposal-review.
  - Review the proposal for problem clarity, option quality, scope control, risk honesty, vision fit, and readiness for spec.
  - Preserve the accepted June 24 preflight-first proposal as the baseline and avoid superseding it silently.
  - Record proposal-review R1 as durable formal review evidence.
  - Normalize proposal status to accepted before downstream spec reliance.
  - Author a focused validation-runtime follow-through spec from the accepted proposal.
  - Normalize spec status to approved after clean spec-review before plan reliance.
  - Author a living execution plan after approved spec-review.
  - Author a traceable test spec from the approved spec and approved execution plan before implementation.
tests:
  - Proposal-review R1 approves the proposal or records material findings before downstream spec reliance.
  - Review-log indexes proposal-review R1 with zero material findings when clean.
  - Proposal status is accepted before downstream spec reliance.
  - The validation-runtime follow-through spec is ready for spec-review.
  - Spec-review R1 approves the validation-runtime follow-through spec or records material findings before downstream reliance.
  - The execution plan records milestones, validation commands, recovery paths, dependencies, and current handoff state before plan-review.
  - Plan-review R1 approves the execution plan or records material findings before test-spec reliance.
  - The validation-runtime follow-through test spec maps R1-R25, E1-E5, EC1-EC9, and M1-M3 before test-spec-review.
  - Test-spec-review R1 reviews proof-map adequacy before implementation handoff.
  - Artifact lifecycle validation accepts the proposal and clean proposal-review evidence.
