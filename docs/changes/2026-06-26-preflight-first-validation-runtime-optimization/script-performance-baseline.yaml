baseline_findings:
  - id: PERF-FOLLOW-001
    finding: "The selected selector surface selects only selector.regression, and selector calculation itself is about one second locally."
    evidence: "select-validation explicit selector-surface command passed in 1.18s and selected selector.regression with cache_status not-applicable."
    implication: "M2 should focus on selector.regression execution and preservation proof rather than selector calculation overhead."
  - id: PERF-FOLLOW-002
    finding: "The direct selector-regression suite remains a long-running selected-validation cost."
    evidence: "python scripts/test-select-validation.py passed 103 tests and reported 142.65s."
    implication: "A timeout override remains necessary for wrapper paths until a safe reduction is implemented or a no-safe-reduction decision is recorded."
  - id: PERF-FOLLOW-004
    finding: "The selected-CI wrapper path exceeded the 180-second override locally but passed with a 300-second override."
    evidence: "The 180-second wrapper run timed out selector.regression after 180.12s; the 300-second wrapper run passed with selector.regression at 273.28s."
    implication: "M2 should treat timeout behavior as part of selector-regression preservation and either reduce the runtime safely or record a no-safe-reduction recommendation."
  - id: PERF-FOLLOW-003
    finding: "Cheap preflight tests remain suitable for early gating."
    evidence: "python scripts/test-select-validation.py -k preflight passed 2 tests in 0.04s suite-reported time and 0.16s /usr/bin/time real time."
    implication: "Preflight-first sequencing remains justified, but it does not by itself reduce selector.regression runtime."

