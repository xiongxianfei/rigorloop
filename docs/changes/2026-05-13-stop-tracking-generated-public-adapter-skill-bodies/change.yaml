  - Plan created and indexed in docs/plan.md.
  - Plan-review approval or recorded material findings.
  - Test spec maps approved requirements to concrete tests.
  - M1 regression tests prove v0.1.3 validates generated release output without tracked adapter skill trees.
  - M1 regression tests prove tracked adapter package fragments are rejected for v0.1.3.
  - M2 regression tests prove only `dist/adapters/README.md` and `dist/adapters/manifest.yaml` remain tracked under `dist/adapters/`.
  - M2 regression tests prove root guidance points to archive installation through `dist/adapters/README.md`.
  - M2 validation proves adapter archive output can be generated and validated without tracked adapter package trees.
  - M3 validation proves v0.1.3 adapter archives generate and validate from release output.
  - M3 validation proves token-cost evidence uses generated public adapter output and rejects `.codex/skills/`.
  - M3 validation proves release metadata, archive checksums, release notes, and release gate wiring validate for v0.1.3.
