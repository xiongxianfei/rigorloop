requirements:
  - Review the customer-portable public skills proposal before specification or planning.
  - Confirm public skills do not depend on RigorLoop repository-internal artifacts in customer projects.
  - Confirm the first implementation slice is audit-first and scoped to high-risk skill wording.
  - Record the accepted first-slice audit result and targeted dynamic benchmark scenarios in the proposal.
  - Record workflow ownership for local `docs/workflows.md` creation or refresh and keep `code-review` out unless direct risk is found.
  - Implement M1 customer-project workflow guidance, audit evidence, static validator proof, and baseline token measurement.
  - Settle the approved proposal status before downstream spec reliance.
  - Create the focused customer-portable public skill evidence spec.
  - Settle the approved spec status before downstream plan reliance.
  - Create the execution plan and update the plan index.
  - Create the matching test spec before implementation.
  - Confirm review evidence is recorded for the formal proposal-review request.
  - Implement M2 project-local evidence wording for audited risky public skills while leaving code-review unchanged.
  - Add focused static validation for forbidden required RigorLoop-internal dependency wording and allowed project-local or guarded references.
  - Record M2 safety-preservation notes for each touched skill.
  - Record after-change static token measurement and compare it to the M1 baseline.
  - Record targeted customer-fixture benchmark evidence for first-slice public skill portability.
  - Validate generated public adapter output from canonical skills without hand-editing generated bodies.
tests:
  - Formal proposal-review evidence for `docs/proposals/2026-05-18-customer-portable-public-skills-and-token-friendly-local-guidance.md`.
  - Review artifact validation for the proposal-review record.
  - Change metadata validation for the review recording root.
  - Formal spec-review evidence for `specs/customer-portable-public-skill-evidence.md`.
  - Artifact lifecycle validation for the active execution plan and plan index.
  - Formal plan-review evidence for `docs/plans/2026-05-18-customer-portable-public-skills.md`.
  - Requirement-to-test coverage for `specs/customer-portable-public-skill-evidence.md`.
  - Static validator proof for customer-project workflow guidance and workflow skill caveat.
  - Static validator proof for M2 public skill project-local evidence wording.
  - Static validator proof for precise forbidden and allowed RigorLoop-internal dependency wording examples.
  - Baseline static token measurement before public skill wording changes.
  - After-change static token measurement and before/after comparison report.
  - Targeted customer-fixture benchmark evidence and fixture exclusion check.
  - Generated public adapter build and validation from temporary output.
