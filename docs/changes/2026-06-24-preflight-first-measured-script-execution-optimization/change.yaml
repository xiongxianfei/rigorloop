  - Architecture assessment records architecture-not-required, architecture-required, or architecture-ambiguous before plan routing.
  - Plan-review R1 approves the plan or records material findings before test-spec.
  - Test spec maps approved requirements, examples, edge cases, and milestones to concrete tests before implementation.
