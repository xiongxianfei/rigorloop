  - If accepted, create a spec for validation execution performance and preflight behavior before implementation changes.
  - Review the spec before architecture assessment or planning relies on it.
  - Record architecture assessment before plan routing.
  - Create a milestone-based execution plan before plan-review.
  - Review the execution plan before test-spec authoring.
