baseline_findings:
  - id: PERF-BASE-001
    finding: "The representative selected-CI bundle is dominated by selector.regression."
    evidence: "selector.regression took 119.50s of 129.36s focused selected-check time."
    implication: "Future optimization should inspect selector regression runtime before adding concurrency or caching."
  - id: PERF-BASE-002
    finding: "Selector selection itself is sub-second warm and 1.10s cold for the measured script surface."
    evidence: "selector_explicit_pr_surface cold elapsed 1.10s; warm elapsed 0.68s."
    implication: "The expensive path in the measured PR-diff run is validation execution, not selector calculation."
  - id: PERF-BASE-003
    finding: "Import overhead for validation_selection is visible but small relative to selected-CI execution."
    evidence: "validation_selection cumulative import time was 23914us in the importtime run."
    implication: "Interpreter/import optimization is unlikely to dominate this representative selected-CI scenario."
  - id: PERF-BASE-004
    finding: "Preflight regression tests are cheap in isolation."
    evidence: "python scripts/test-select-validation.py -k preflight passed 2 tests in 0.17s wall time."
    implication: "Cheap preflight behavior is suitable as an early gate, but broader selected-CI runtime remains dominated by regression checks."

