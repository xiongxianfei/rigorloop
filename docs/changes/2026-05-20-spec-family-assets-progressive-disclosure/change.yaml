  - Review artifact validation for clean code-review M2 R3 evidence.
  - Review artifact validation for code-review M3 R1 evidence.
  - Review artifact closeout validation for recorded proposal-review findings.
  - Change metadata validation for this change-local root.
  - Whitespace validation for touched proposal and review artifacts.
  - Skill validator fixture coverage for spec-family asset mapping, metadata, status, placeholder, review-class boundary, and baseline-summary checks.
  - Full canonical skill validation after M1 validator changes.
  - Targeted and full skill validation after M2 `spec` asset extraction.
  - Behavior-preservation, token, and cold-read evidence inspection for M2.
  - Targeted and full skill validation after M3 `spec-review` asset extraction.
  - Behavior-preservation, token, and cold-read evidence inspection for M3.
  - Targeted and full skill validation after M4 `test-spec` asset extraction.
  - Behavior-preservation, token, and cold-read evidence inspection for M4.
