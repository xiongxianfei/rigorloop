requirements:
  - Record the proposal direction for applying assets-only progressive disclosure to spec-family skills after PR #79.
  - Resolve proposal-review findings SFA-PR1, SFA-PR2, SFA-PR3, SFA-PR4, and SFA-PR5 before downstream plan reliance.
  - Settle the accepted proposal status before spec reliance.
  - Create a contract-level spec for spec-family assets progressive disclosure before plan reliance.
  - Record clean spec-review approval before downstream plan reliance.
  - Settle the approved spec status before plan reliance.
  - Create an active execution plan before test-spec and implementation.
  - Update the lifecycle plan index when the active plan is created.
  - Record clean plan-review approval before downstream test-spec reliance.
  - Create an active test spec before implementation.
  - Update the active plan and plan index so implementation relies on the active test spec.
  - Implement M1 baseline summary and validator foundation before skill text changes.
  - Resolve code-review M1 finding SFA-M1-CR1 before M1 closeout or M2 implementation.
  - Implement M2 `spec` assets with behavior-preservation, token, and cold-read evidence before M2 code review.
  - Resolve code-review M2 finding SFA-M2-CR1 before M2 closeout or M3 implementation.
  - Record the proof-route assessment that no skill-contract spec amendment is required before skill edits.
  - Keep rules, stop conditions, enums, review dimensions, coverage obligations, routing, and lifecycle boundaries in SKILL.md.
  - Require generated skill mirror and temporary generated adapter proof for packaged assets.
  - Require a change-local baseline summary before implementation.
