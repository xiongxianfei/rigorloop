requirements:
  - Define a proposal direction for simplifying architecture and architecture-review skill surfaces.
  - Remove existing change-local delta requirements from the normal architecture skill contract.
  - Preserve the C4 plus arc42 plus ADR method while routing unsettled direction to proposal and unsettled behavior to spec.
  - Record material proposal-review findings before proposal revision.
  - Resolve PASS-F1 by requiring a new ADR that amends or narrows the existing architecture-package-method ADR without rewriting accepted decision history.
  - Record proposal-review R2 approval before downstream spec authoring relies on the proposal.
  - Draft the architecture-package-method spec amendment that removes change-local deltas from the normal architecture authoring path.
  - Draft review-surface classification requirements for architecture-review.
  - Record spec-review R1 approval before downstream architecture, test-spec, or implementation relies on the spec amendment.
  - Normalize the approved spec amendment before architecture artifacts rely on it.
  - Update the canonical architecture package directly for the simplified architecture surfaces.
  - Create a new ADR that amends or narrows the 2026-04-28 architecture package method decision.
  - Record architecture-review R1 approval before downstream planning or implementation relies on the canonical architecture update and ADR.
  - Create an active execution plan that sequences test-spec alignment, canonical skill updates, generated output refresh, adapter drift check, adapter validation, and lifecycle closeout.
  - Record plan-review R1 material finding before revising the execution plan.
  - Resolve PR-F1 by adding per-milestone code-review handoff and review closeout before final lifecycle closeout.
  - Record plan-review R2 approval before downstream test-spec revision relies on the plan.
  - Revise the architecture-package-method test spec for the 2026-05-09 simplification before implementation.
  - Complete M1 source lifecycle alignment and hand off to code-review.
  - Record code-review R1 material finding before review-resolution fixes.
  - Record code-review R2 material finding before review-resolution fixes.
  - Record code-review R3 no-new-finding review of the CR1/CR2 open-state alignment.
tests:
  - Proposal-review artifact record for material findings.
  - Review artifact closeout validation after PASS-F1 resolution.
  - Review artifact closeout validation after proposal-review R2 approval.
  - Artifact lifecycle validation for the accepted proposal and draft spec amendment.
  - Stale phrase scan for retired normal change-local delta contract wording.
  - Review artifact closeout validation after spec-review R1 approval.
  - Artifact lifecycle validation for the canonical architecture package and new ADR.
  - Review artifact closeout validation after architecture-review R1 approval.
  - Artifact lifecycle and selected-validation checks for the active plan and plan index.
  - Review artifact validation after plan-review R1 records PR-F1.
  - Review artifact closeout validation after PR-F1 resolution.
  - Review artifact closeout validation after plan-review R2 approval.
  - Artifact lifecycle, selected-validation, stale-wording, and diff checks after test-spec revision.
  - M1 targeted validation before code-review handoff.
  - Review artifact validation after code-review R1 records CR1-F1.
  - Review artifact validation after code-review R2 records CR2-F1.
  - Review-resolution state alignment validation for CR1-F1 and CR2-F1 before returning M1 to code-review.
  - Review artifact validation after code-review R3 records no new findings.
  - Review-resolution closeout validation after CR1-F1 and CR2-F1 are resolved and M1 returns to code-review.
