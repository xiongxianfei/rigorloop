requirements:
  - Review the separately armed implementation autoprogression through verify proposal before spec.
  - Confirm the proposal preserves separate authorization from authoring autoprogression.
  - Confirm the proposal keeps auto-fix authority reviewer-declared, bounded, path-local, and auditable.
  - Confirm the proposal stops before the external PR boundary.
  - Record proposal-review R1 as durable formal review evidence.
  - Settle proposal status before downstream spec reliance.
  - Amend workflow-stage autoprogression, workflow, and review-finding contracts for the implementation-through-verify profile.
  - Keep implementation-profile authorization separate from authoring-profile authorization.
  - Specify reviewer-owned auto-fix classification, bounded correction loops, phase gating, test-spec settlement, fresh verify evidence, and the PR boundary.
  - Record architecture assessment for the approved spec amendments.
  - Update canonical architecture and ADR surfaces for implementation-profile orchestration, phase gating, review classification, correction loops, verify freshness, and PR boundary.
  - Create a milestone-based implementation plan for the first slice through plan-review.
  - Create an active test spec that maps implementation-profile requirements, examples, edge cases, acceptance criteria, and milestones to proof surfaces before implementation.
  - Implement M1 profile schema and authorization-policy validation for independent implementation-through-verify profile records.
  - Implement M2 workflow route evaluation for activation gates, phase boundaries, test-spec settlement, first-code-review identity recheck, and ordered milestone routing.
  - Implement M3 reviewer-owned finding classification validation and automatic correction-loop guardrails.
  - Update canonical skill surfaces and adapter validation proof for M4 Phase C guardrails, final verify freshness, verify-failure pause, and PR-boundary behavior.
  - Implement M5 behavior-preservation evidence and final validation bundle alignment for the first implementation slice.
  - Explain why each meaningful implementation change exists before final verify.
tests:
  - Proposal-review R1 approves or records material findings for the proposal.
  - Review-log indexes proposal-review R1 with zero material findings when clean.
  - Proposal status is normalized from draft to accepted before downstream spec reliance.
  - Spec amendments are ready for formal spec-review before architecture or planning relies on them.
  - Spec-review R1 approves or records material findings for the amended contracts.
  - Approved spec amendments are normalized before architecture assessment relies on them.
  - Architecture assessment records architecture-required, architecture-not-required, or architecture-ambiguous before downstream routing.
  - Architecture surfaces are ready for architecture-review before planning relies on them.
  - Architecture-review R1 approves or records material findings before planning relies on the design.
  - Plan identifies milestones, validation, recovery paths, dependencies, current handoff state, and downstream gates before plan-review.
  - Plan-review R1 approves or records material findings before test-spec relies on the plan.
  - Test spec maps approved requirements and edge cases to concrete automated, manual, contract, and smoke proof before implementation starts.
  - Change-metadata validator and query coverage proves implementation-through-verify named records, phase/state enforcement, independent profile identity, live-state field rejection, evidence-only summary exposure, and legacy authoring-profile compatibility.
  - Workflow-state fixture coverage proves implementation profile activation preconditions, phase A audit-only behavior, Phase B closeout refusal, Phase C promotion gating, deterministic test-spec settlement, settlement identity recheck, ordered milestone routing, and idempotent resume.
  - Review-artifact validator and workflow-state fixture coverage prove missing classifications pause, mechanical and declared-safe finding fields are structurally required, production-code declared-safe fixes require proof, correction rounds shrink without new findings, round caps are enforced, paths and commands stay scoped, governing edits pause, and CI deny-list hits pause.
  - Skill and adapter validation proves public skill surfaces expose implementation-profile phase boundaries, promotion evidence, fresh verify evidence, verify failure pause, and stop-before-PR behavior.
  - Behavior-preservation evidence covers all approved implementation-through-verify acceptance criteria and test-check IDs, while static skill validation proves no `test-spec-review` skill or stage is introduced.
  - Explain-change artifact links the actual diff to proposal, specs, architecture, plan milestones, tests, review outcomes, validation evidence, alternatives, scope control, and remaining risks.
