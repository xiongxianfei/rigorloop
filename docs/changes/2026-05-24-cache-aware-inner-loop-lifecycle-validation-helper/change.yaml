change_id: 2026-05-24-cache-aware-inner-loop-lifecycle-validation-helper
title: Cache-aware inner-loop lifecycle validation helper
classification: proposal-review-recording
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-24-cache-aware-inner-loop-lifecycle-validation-helper.md
  spec: specs/validation-idempotency-and-cache-hit-safety.md
  test_spec: specs/validation-idempotency-and-cache-hit-safety.test.md
  architecture: docs/architecture/system/architecture.md
  adr: docs/adr/ADR-20260523-validation-idempotency-cache-hit-safety.md
  plan: docs/plans/2026-05-24-cache-aware-inner-loop-lifecycle-validation-helper.md
requirements:
  - Record formal proposal-review evidence before downstream spec reliance.
  - Settle the approved proposal status to accepted before spec reliance.
  - Amend the validation idempotency spec for the cache-aware inner-loop lifecycle validation helper.
  - Record spec-review R1 findings before spec revision or downstream reliance.
  - Resolve VIC-IH-SR1 through VIC-IH-SR3 before architecture, plan, test-spec, or implementation relies on the helper amendment.
  - Keep spec-review stop condition in force until spec-review reruns cleanly.
  - Record spec-review R2 before downstream reliance on the revised helper amendment.
  - Settle the approved validation-idempotency spec status before architecture reliance.
  - Update the canonical architecture package and existing validation-cache ADR for the helper mode.
  - Keep C4 diagrams unchanged because the helper does not change system or container boundaries.
  - Record architecture-review approval before execution planning.
  - Create a living execution plan before test-spec or implementation.
  - Add the execution plan to the bounded plan index.
  - Record plan-review approval before test-spec.
  - Amend the validation-idempotency test spec before implementation.
  - Record user approval of the validation-idempotency test spec before implementation.
  - Sync the active plan and plan index after test-spec handoff.
  - Implement M1 helper mode and canonical identity support before code-review.
  - Keep M1 scoped to helper parser/identity support, leaving formal evidence writes, closeout rejection, selector routing, and measurement for later milestones.
  - Record code-review M1 R1 before advancing to M2.
  - Implement M2 helper runtime so `explicit-paths-inner-loop` uses the approved inner-loop cache path without long caller-provided cache flags.
  - Keep M2 helper cache misses and disabled-cache states fail-closed to actual lifecycle validation.
  - Record M2 helper formal cache-hit evidence only when a safe change root or explicit evidence path is available; ad hoc helper cache hits must not write formal evidence.
  - Preserve displayed helper argv and canonical direct cache argv in formal cache-hit evidence.
  - Hand M2 to code-review before advancing to closeout rejection, selector routing, measurement, or final closeout milestones.
  - Record code-review M2 R1 and keep M2 in review-resolution until VIC-IH-CR-M2-001 is resolved.
  - Resolve VIC-IH-CR-M2-001 before rerunning code-review M2.
  - Record code-review M2 R2 before advancing to M3.
  - Implement M3 closeout rejection so helper `explicit-paths-inner-loop` proof commands cannot satisfy closeout.
  - Preserve direct `explicit-paths` actual-run closeout eligibility while allowing helper cache-hit evidence only as supporting context.
  - Hand M3 to code-review before advancing to selector routing, measurement, or final closeout milestones.
  - Record code-review M3 R1 and keep M3 in review-resolution until VIC-IH-CR-M3-001 is resolved.
  - Resolve VIC-IH-CR-M3-001 before rerunning code-review M3.
  - Record code-review M3 R2 before advancing to M4.
  - Implement M4 helper measurement validation so the schema requires helper invocations, actual-run fallbacks, closeout actual runs, and helper count consistency.
  - Preserve deterministic selector routing for `validation-cache-evidence.yaml` and `validation-cache-measurement.yaml` before relying on helper workflow evidence.
  - Record first-slice measurement evidence with eligibility expansion defaulting to defer unless reviewed measurement justifies follow-up.
  - Hand M4 to code-review before advancing to repository-local guidance, behavior-preservation, or final closeout milestones.
  - Implement M5 repository-local guidance without exposing RigorLoop-internal helper commands, validator paths, selector mechanics, generated-output paths, or maintenance details in published skills.
  - Record behavior-preservation evidence for direct lifecycle actual run, helper cache miss, helper cache hit, closeout validation, failure detection, cache evidence, selector/CI routing, measurement, published skill boundary, and generated adapter output.
  - Hand M5 to code-review before advancing to final closeout and PR handoff.
  - Preserve the proposal's first-slice boundary for the cache-aware inner-loop lifecycle validation mode.
  - Route remaining selector-registration and cross-change measurement details to spec and plan.
tests:
  - Proposal-review R1 approves the proposal with no material findings.
  - Spec amendment defines `explicit-paths-inner-loop`, safe evidence writes, closeout rejection, CI exclusion, selector route expectations, and measurement fields.
  - Spec-review R1 records VIC-IH-SR1, VIC-IH-SR2, and VIC-IH-SR3 requiring spec revision before downstream reliance.
  - Spec revision resolves helper cache identity normalization, non-goal eligibility consistency, and helper measurement count consistency.
  - Spec-review R2 confirms VIC-IH-SR1, VIC-IH-SR2, and VIC-IH-SR3 are resolved with no material findings.
  - Review-resolution closeout records final dispositions and no open findings after spec-review R2.
  - Architecture records helper mode adoption, canonical direct-command cache identity, formal evidence shape, closeout actual-run boundary, measurement fields, and no new diagram boundary.
  - Architecture-review R1 approves the canonical architecture update and ADR amendment with no material findings.
  - Plan sequences helper implementation into reviewable milestones and keeps current handoff at plan-review.
  - Plan-review R1 approves the plan with no material findings and routes next to test-spec.
  - Test spec maps helper requirements to tests for canonical identity normalization, runtime fallback, formal evidence, closeout rejection, selector routing, measurement consistency, and published-skill boundaries.
  - User approval confirms the test spec is ready for implementation reliance.
  - Active plan handoff points to M1 implementation after test-spec amendment.
  - M1 tests cover helper command-family eligibility, canonical direct argv normalization, displayed helper argv preservation, path-order identity changes, direct actual-run cache identity reuse, and helper CLI explicit-path behavior.
  - M1 implementation leaves direct `explicit-paths` actual-run closeout behavior unchanged and does not introduce wrapper scripts or broader validator caching.
  - Code-review M1 R1 closes M1 with no material findings and routes next to M2 implementation.
  - M2 tests cover helper default cache use without long cache flags, cache-hit output, cache-miss actual-run fallback, safe formal evidence writes, ad hoc no-evidence behavior, and displayed/canonical argv evidence rendering.
  - M2 implementation keeps direct `explicit-paths` closeout behavior unchanged and leaves closeout rejection, selector routing, and measurement to later milestones.
  - Active plan handoff points to code-review M2 after implementation validation.
  - Code-review M2 R1 records VIC-IH-CR-M2-001 against the over-broad ad hoc no-evidence test assertion.
  - Review-resolution narrows the ad hoc no-evidence assertion so existing formal cache-hit evidence files do not fail the test.
  - Code-review M2 R2 closes M2 with no material findings and routes next to M3 implementation.
  - M3 tests cover helper command closeout rejection in both compact change metadata validation and artifact lifecycle validation.
  - M3 implementation keeps `cache-hit-inner-loop` and helper command proof inner-loop only; separate direct `actual-run-pass` remains the closeout-eligible path.
  - Code-review M3 R1 records VIC-IH-CR-M3-001 against helper mode detection that missed the `--mode=explicit-paths-inner-loop` flag spelling.
  - Review-resolution normalizes helper mode detection for both `--mode VALUE` and `--mode=VALUE` forms.
  - Code-review M3 R2 closes M3 with no material findings and routes next to M4 implementation.
  - M4 tests cover helper-specific measurement fields, helper/fallback/closeout count relationships, cache-hit-rate drift, and selector routing for cache evidence and measurement files.
  - M4 implementation validates helper measurement evidence using the approved schema, records first-slice measurement evidence, and confirms deterministic selector routing for cache evidence and measurement files.
  - Code-review M4 R1 closes M4 with no material findings and routes next to M5 implementation.
  - M5 behavior-preservation evidence records the repository-local two-command table, proves direct actual-run validation and helper fallback behavior, and records published-skill no-exposure proof.
  - Code-review M5 R1 closes M5 with no material findings and routes next to M6 implementation.
  - Review artifact validation covers the clean proposal-review receipt and review log.
  - Artifact lifecycle validation covers the proposal and review evidence.
