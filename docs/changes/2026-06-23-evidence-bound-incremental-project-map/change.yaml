requirements:
  - Record formal proposal-review evidence before downstream spec reliance.
  - Settle the approved proposal status to accepted before downstream reliance.
  - Create a dedicated project-map feature spec for evidence, freshness, root/area map, skeleton, and downstream reliance behavior.
  - Hand the draft project-map spec to spec-review before downstream architecture, planning, test-spec, or implementation reliance.
  - Record spec-review approval before downstream architecture, planning, test-spec, or implementation reliance.
  - Settle the approved project-map spec status before architecture reliance.
  - Record canonical architecture impact for project-map maps, skeleton asset packaging, validation scope, generated adapter inclusion, and no-ADR rationale before planning.
  - Record architecture-review findings before downstream planning reliance.
  - Resolve PMAP-AR1-F1 by aligning the Building Block View and C4 container diagram before planning reliance.
  - Create an active execution plan and update the plan index before plan-review reliance.
  - Resolve PMAP-PLAN1-F1 before test-spec or implementation reliance.
  - Create an active project-map test spec before implementation reliance.
tests:
  - Proposal-review R1 approves the proposal with no material findings.
  - Spec draft captures project-map evidence, freshness, root/area map, command, skeleton, and downstream reliance contracts.
  - Spec-review R1 approves the project-map spec with no material findings.
  - Canonical architecture records project-map as a living orientation reference with root/area registration, freshness, correction notes, skeleton packaging, generated adapter inclusion, and downstream reliance limits.
  - Architecture-review R1 records PMAP-AR1-F1 as a material C4 sufficiency finding.
  - Architecture revision adds Project maps as a first-class C4 container and clarifies its boundary from Architecture.
  - Architecture-review R2 approves the corrected canonical architecture update with no material findings.
  - Architecture-review R3 reconfirms the corrected canonical architecture update with no material findings.
  - Execution plan sequences validator coverage, skill and skeleton updates, representative evidence, and generated adapter proof into reviewable milestones.
  - Plan-review R1 requests changes for PMAP-PLAN1-F1 because M1 is not independently closeable before M2.
  - Plan revision resolves the M1/M2 boundary by making M1 fixture/helper scaffolding only and M2 canonical source plus enforcement.
  - Plan-review R2 approves the revised plan with no material findings.
  - Plan-review R3 requests changes for PMAP-PLAN2-F1 because the plan index still names plan-review while the plan body names test-spec.
  - Plan index update resolves PMAP-PLAN2-F1 by synchronizing the active next stage to test-spec.
  - Plan-review R4 approves the synchronized plan with no material findings.
  - Plan-review R5 requests changes for PMAP-PLAN3-F1 because the Readiness section still names superseded plan-review R2.
  - Plan readiness wording resolves PMAP-PLAN3-F1 by delegating current next-stage ownership to Current Handoff Summary.
  - Plan-review R6 approves the corrected readiness wording with no material findings.
  - Project-map test spec maps approved requirements, examples, edge cases, milestone proof, fixtures, generated adapter proof, and no-migration checks before implementation.
  - User approval accepts the active project-map test spec before M1 implementation.
  - M1 adds controlled project-map validator fixture coverage without enabling canonical project-map enforcement.
  - Selector fixture-directory classification keeps the approved M1 selected-validation command closeable.
  - Code-review M1 R1 closes M1 with no material findings and hands off to M2.
  - M2 normalizes the canonical project-map skill, adds the packaged skeleton asset, enables canonical enforcement, and records behavior-preservation evidence.
  - Code-review M2 R1 closes M2 with no material findings and hands off to M3.
  - M3 records representative root and area map output proof, correction-note proof, placeholder proof, and cold-read proof.
  - Selector evidence-class registration routes the M3 deterministic project-map proof files through lifecycle validation instead of manual routing debt.
  - Code-review M3 R1 closes M3 with no material findings and hands off to M4.
  - M4 generated-output proof records local generated skill parity, temporary adapter archive validation, skeleton inclusion, and no automatic project-map migration.
  - Code-review M4 R1 closes M4 with no material findings and hands off to explain-change.
  - Explain-change records the durable rationale before final verify.
  - Final verify records local branch-ready evidence before PR handoff.
  - Review artifact validation covers proposal-review, spec-review, architecture-review R1/R2/R3, review log, and review resolution.
  - Artifact lifecycle validation covers the proposal, approved spec, canonical architecture package, change metadata, review log, review resolution, and review records.
