requirements:
  - Normalize the broad-smoke safe parallelism proposal to accepted after approved proposal-review with no material findings.
  - Author and approve the broad-smoke safe parallelism spec before execution planning.
  - Record architecture assessment before plan routing.
  - Create a milestone-based execution plan before plan-review.
  - Review the execution plan before test-spec authoring.
  - Author a traceable test spec before implementation.
  - Implement M1 classification freshness validation and baseline evidence before scheduling behavior changes.
  - Implement M2 first-slice opt-in broad-smoke parallel scheduling behind explicit --jobs greater than 1.
  - Record M3 opt-in runtime result evidence and default-promotion decision.
tests:
  - Proposal-review R1 and R2 are recorded with approved status and no material findings.
  - Spec-review R1 is recorded with approved status and no material findings.
  - Architecture assessment records architecture-not-required because the change stays inside the existing CI wrapper and repository-owned validation scripts.
  - Plan-review R1 is recorded with approved status and no material findings.
  - Test spec maps approved requirements, examples, edge cases, and milestones to concrete tests before implementation.
  - Broad-smoke classification validator reconciles the change-local classification artifact with the current scripts/ci.sh child inventory.
  - Broad-smoke baseline artifact records per-child timing evidence before execution scheduling changes.
  - Broad-smoke omitted --jobs and --jobs 1 remain sequential compatibility paths.
  - Broad-smoke explicit --jobs greater than 1 validates classification before launching parallel children.
  - Broad-smoke opt-in parallel mode captures child output separately, aggregates deterministic output, and reports all required failures in canonical order.
  - Broad-smoke result evidence records jobs, child phases, durations, output sizes, delta, preservation fields, and sequential-only rationale.
  - Broad-smoke default promotion remains deferred when measured evidence does not justify promotion.
  - Validation selection routes broad-smoke parallelism evidence and validator script changes without manual routing debt.
