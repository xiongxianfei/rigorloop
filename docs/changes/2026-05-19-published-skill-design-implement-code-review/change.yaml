requirements:
  - Continue the merged published-skill design rollout with the next execution/review lifecycle pair.
  - Keep the next rollout scoped to skills/implement/SKILL.md and skills/code-review/SKILL.md unless a reviewed plan revision changes scope.
  - Preserve the published-skill design contract covering description routing, workflow role, execution body, resource-map conditions, self-containment, output skeletons, routing coverage, behavior preservation, behavior parity, and token-cost discipline.
  - Preserve implement first-pass completeness, milestone-aware handoff, plan update ownership, validation evidence, and no-review-claim boundaries.
  - Preserve code-review independent-review mode, material finding recording, direct-proof expectations, review-resolution routing, and no-PR-readiness claim boundaries.
  - Do not merge, retire, rename, remove, or change ownership of skills in this slice.
  - Do not introduce broad semantic scoring or runtime skill auto-selection claims.
  - Amend the test spec for this execution/review slice before implementation starts.
