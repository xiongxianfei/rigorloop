  - Focused skill validator tests when deterministic checks are added or extended.
  - Canonical skill validation for skills/implement/SKILL.md and skills/code-review/SKILL.md.
  - Generated skill and temporary adapter archive validation from canonical skills.
  - Behavior-preservation and behavior-parity evidence for implement and code-review.
