requirements:
  - Record the accepted proposal direction for treating change records as queried catalogs.
  - Preserve separate Workstream A and Workstream B implementation slices.
  - Record formal proposal-review evidence before downstream spec reliance.
  - Record architecture guidance for evidence registration, selector routing, bounded query helper behavior, and Workstream A before Workstream B sequencing.
  - Record the milestone plan for Workstream A before Workstream B implementation.
  - Record a focused test spec mapping requirements, examples, edge cases, and milestones to concrete proof surfaces before implementation.
  - Implement M1 evidence class registry and registered selector routing while preserving selected lifecycle validation behavior.
  - Implement M2 registration-debt diagnostics and actual changed-path selector proof before verify.
  - Implement M3 bounded change-record query helper for summary, artifacts, validation latest, and validation stage reads.
  - Implement M4 bounded change-record read guidance in affected stage skills after query-helper commands are stable.
  - Record M5 durable change rationale and lifecycle handoff evidence without claiming final verify or PR readiness.
tests:
  - Proposal-review clean receipt validates through review artifact validation.
  - Artifact lifecycle validation covers the proposal and review evidence.
  - Architecture and ADR lifecycle validation covers the canonical architecture package update.
  - Plan artifact lifecycle validation covers the plan body and plan index.
  - Test-spec artifact lifecycle validation covers the active proof surface before implementation.
  - Selector regression covers registered evidence entries, bounded patterns, broad-pattern rejection, ambiguity rejection, and registered evidence routing.
  - Selector regression covers unregistered deterministic evidence registration debt and local changed-path proof.
  - Query helper regression covers compact and legacy summary reads, artifact-only reads, latest and stage-scoped validation slices, stable diagnostics, unsafe path handling, deterministic output, read-only behavior, and active change summary.
  - Skill regression covers bounded change-record read guidance, full-read escalation conditions, and query-helper command references in affected stage skills.
  - Lifecycle closeout proof covers explain-change rationale, review artifact closeout, metadata validation, artifact lifecycle validation, selected CI, and whitespace.
