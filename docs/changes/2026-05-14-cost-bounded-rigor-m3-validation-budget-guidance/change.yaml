requirements:
  - Record merged M2 plan state after PR #55.
  - Record M3 spec as a follow-on artifact of the accepted cost-bounded-rigor proposal.
  - Author focused M3 validation-budget guidance spec before spec-review.
  - Record clean spec-review before downstream plan reliance.
  - Keep M3 separate from lifecycle token-cost summaries, release packaging, adapter packaging, dynamic benchmarks, hard token gates, and progressive-loading work.
  - Preserve targeted validation as the first validation layer when changed paths are known and no authoritative broad-smoke trigger applies.
  - Preserve broad-smoke, release, test-spec, review-resolution, active-plan, and selector triggers.
  - Distinguish `docs/workflows.md` guidance, selector behavior, stage skill reminders, active plan/test-spec requirements, review-resolution requirements, and release metadata requirements.
  - Normalize the approved M3 spec status before downstream plan reliance.
  - Create an active M3 plan before plan-review.
  - Record clean plan-review before test-spec reliance.
