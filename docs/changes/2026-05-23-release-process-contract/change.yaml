change_id: 2026-05-23-release-process-contract
title: RigorLoop release process contract
classification: proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-23-release-process-contract.md
  spec: specs/release-process-contract.md
  test_spec: specs/release-process-contract.test.md
  architecture: docs/architecture/system/architecture.md
  adr: docs/adr/ADR-20260523-release-process-contract.md
  plan: docs/plans/2026-05-23-release-process-contract.md
  review_resolution: docs/changes/2026-05-23-release-process-contract/review-resolution.md
  explain_change: docs/changes/2026-05-23-release-process-contract/explain-change.md
requirements:
  - Record the proposal direction for defining the release process once and executing routine publishes as operations.
  - Preserve the routine-publish boundary so ordinary releases do not require new proposal/spec/plan ceremony when no new decision is introduced.
  - Record release evidence, gate, versioning, npm publish policy, registry verification, and recovery as downstream spec topics.
  - Record formal proposal-review evidence before downstream spec reliance.
  - Define the standing release-process contract in a feature spec after proposal-review approval.
  - Record formal spec-review findings before downstream reliance.
  - Record clean spec-review after REL-SR1 resolution before downstream reliance.
  - Record canonical architecture and ADR for the standing release-process boundary before planning.
  - Record formal architecture-review evidence before downstream planning reliance.
  - Create a living execution plan before implementation or release workflow configuration.
  - Record formal plan-review evidence before test-spec or implementation reliance.
  - Create a traceable test specification before implementation.
  - Implement M1 release evidence README, index, and template/checklist surfaces.
  - Record clean M1 code-review before advancing to M2 implementation.
  - Implement M2 release evidence selector routing for docs/releases/v<version>.md.
  - Implement M2 lightweight release-evidence checklist validation fixtures for routine gate, emergency deferral, non-deferrable registry verification, and secret-bearing evidence cases.
  - Record M2 code-review finding CR-M2-1 before review-resolution fixes.
  - Resolve CR-M2-1 by selecting artifact lifecycle checklist validation for flat release evidence files.
  - Record clean M2 code-review re-review before advancing to M3 implementation.
  - Implement M3 release gate dry-run contract output and non-publishing rehearsal evidence.
  - Preserve M3 release CI validation for historical adapter artifacts by rebuilding from the recorded release source commit.
  - Record clean M3 code-review before advancing to M4 implementation.
  - Record M4 explain-change and lifecycle closeout evidence before final verify or PR handoff.
  - Record clean M4 code-review before final verify.
tests:
  - Proposal artifact lifecycle validation covers the accepted proposal.
  - Spec artifact lifecycle validation covers the release-process contract spec.
  - Proposal-review clean receipt validates through review artifact validation.
  - Spec-review finding record validates through review artifact validation.
  - Review-resolution records accepted REL-SR1 disposition after spec revision.
  - Spec-review clean receipt validates after REL-SR1 resolution.
  - Change metadata validation covers the current review state.
  - Artifact lifecycle validation covers canonical architecture and ADR updates.
  - Architecture-review clean receipt validates through review artifact validation.
  - Plan artifact lifecycle validation covers the release-process execution plan and plan index update.
  - Plan-review clean receipt validates through review artifact validation.
  - Test spec artifact lifecycle validation covers the release-process proof plan.
  - M1 targeted validation covers release evidence authoring surfaces and lifecycle metadata.
  - M1 clean code-review receipt validates through review artifact validation.
  - Selector regression covers docs/releases/v<version>.md routing and release guidance paths that do not require a version.
  - Artifact lifecycle validator regression covers release-evidence checklist fixtures, emergency deferrals, non-deferrable registry verification, and forbidden secret/private-machine markers.
  - M2 code-review identified that selector routing must select the lifecycle/checklist route for docs/releases/v<version>.md.
  - Direct selector proof confirms docs/releases/v1.2.3.md selects artifact_lifecycle.validate after CR-M2-1 resolution.
  - M2 clean re-review receipt validates through review artifact validation.
  - M3 release gate dry-run proves standing gate command selection without executing a publish command.
  - M3 release CI wrapper validation proves v0.1.5 adapter artifacts from the recorded release source commit still validate against release metadata.
  - M3 clean code-review receipt validates through review artifact validation.
  - M4 explain-change records implementation rationale, validation evidence, scope control, risks, and downstream readiness limits.
  - M4 clean code-review receipt validates through review artifact validation.
