  verify_report: docs/changes/2026-05-24-target-native-init-commands-and-adapter-terminology-retirement/verify-report.md
requirements:
  - Remove public `--adapter` CLI syntax for the 0.3.0 target-native init release.
  - Accept only `codex`, `claude`, and `opencode` as init targets.
  - Make default `init <target>` install-only and leave `rigorloop.yaml` and `rigorloop.lock` unchanged.
  - Write project state only when `init <target> --write-state` is requested.
  - Rename user-visible state-file keys away from `adapter`.
  - Preserve non-user-visible internal adapter implementation names unless a later approved artifact changes that boundary.
  - Require packed-package pre-publish smoke and live registry/download post-publish smoke.
  - Settle the approved proposal status to accepted before spec reliance.
  - Create a target-native init spec covering command syntax, install-only default, `--write-state`, target-oriented state files, metadata/archive verification, and release smoke.
  - Record spec-review R1 before spec revision or downstream reliance.
  - Resolve TNI-SR1 through TNI-SR3 before architecture, plan, test-spec, or implementation relies on the target-native init spec.
  - Record spec-review R2 approval before downstream reliance.
  - Settle the approved spec status before architecture reliance.
  - Update the canonical architecture package for target-native init, install-only default behavior, explicit state writes, state safety reads, and release-smoke boundaries.
  - Record a durable ADR for the target-native init and explicit state boundary decision.
  - Record architecture-review R1 before downstream test-spec, planning, or implementation relies on the target-native init architecture.
  - Create a living execution plan and plan index entry before plan-review and test-spec.
  - Record plan-review R1 before downstream test-spec or implementation relies on the plan.
  - Resolve TNI-PLR1-F1 before test-spec or implementation relies on the target-native init plan.
  - Record plan-review R2 approval before test-spec or implementation relies on the revised plan.
  - Create an active target-native init test spec before implementation.
  - Implement M1 parser/state schema behavior before code-review covering positional `init <target>`, removed `--adapter`, default install-only state behavior, explicit `--write-state`, and target-oriented state-file schemas.
  - Record M1 code-review R1 before closing the M1 implementation milestone.
  - Resolve TNI-CR1-F1 before rerunning M1 code-review.
  - Record M1 code-review R2 before advancing to M2 implementation.
  - Implement M2 verified install, existing-state safety parsing, legacy state compatibility, target roots, and mutation-conflict preservation before M2 code-review.
  - Resolve TNI-CR3-F1 before closing M2 and advancing to M3 implementation.
  - Rerun M2 code-review after resolving TNI-CR3-F1 before advancing to M3.
  - Record clean M2 code-review R4 before advancing to M3 implementation.
tests:
  - Proposal-review R1 records the state-file terminology boundary conflict before spec reliance.
  - Review-resolution remains open until the proposal consistently distinguishes user-visible state keys from non-user-visible internals, then closes after R2 approval.
  - Proposal-review R2 confirms the state-file terminology boundary is consistent and ready for spec.
  - Proposal-review R3 confirms no new material findings and records the status-normalization note before spec reliance.
  - Spec authoring records the upstream proposal status settlement and creates a draft spec ready for spec-review.
  - Spec-review R1 records dry-run, state-file key/value terminology, and default-init state parsing findings before downstream reliance.
  - Spec revision resolves TNI-SR1, TNI-SR2, and TNI-SR3.
  - Spec-review R2 confirms the revised spec is ready for downstream artifacts.
  - Spec-review R3 confirms no new material findings before downstream status normalization.
  - Architecture package records the target-native runtime flow, downstream state deployment boundary, crosscutting state model, quality targets, risks, and architecture-review handoff.
  - ADR records the durable target-native init, explicit state-write, target-oriented schema, default state safety, and release-smoke gate decisions.
  - Architecture-review R1 confirms no material findings and clears the architecture for downstream test-spec and planning.
  - Plan sequences implementation into reviewable milestones covering parser/state schema, verified install/state safety, release/docs validation, and lifecycle closeout.
  - Plan-review R1 records the release-verify invocation mismatch before test-spec or implementation.
  - Plan revision resolves TNI-PLR1-F1 by using the existing `release-verify.sh` environment-variable interface.
  - Plan-review R2 confirms the revised plan is ready for test-spec.
  - Test spec maps the approved requirements, examples, edge cases, architecture boundaries, and plan milestones to concrete tests.
  - Package CLI tests prove M1 behavior for target parsing, removed `--adapter`, default dry-run without state plans, `--write-state` dry-run state content, schema v2 manifest output, schema v3 lockfile parsing/serialization, and package README/help alignment.
  - Code-review R1 checks the M1 implementation diff against the approved spec, test spec, plan, and validation evidence.
  - Parser-edge package CLI tests cover named rejected aliases and mixed removed syntax forms required by TNI-CR1-F1.
  - Code-review R2 confirms TNI-CR1-F1 is resolved and closes M1 with no material findings.
  - Package CLI tests prove default target-native init installs without state files, unrelated valid state is byte-preserved, malformed existing state blocks before mutation, and generated path conflicts keep mutation-conflict exit behavior.
  - Package publication smoke validates the packed target-native binary help and dry-run command shape.
  - Code-review R3 records the M2 direct-proof gap for default opencode install, default implicated drift/conflict blocking, and default legacy state preservation.
  - Direct package CLI tests resolve TNI-CR3-F1 by proving default opencode no-state install, selected-target drift blocking, overlapping-root conflict blocking, and legacy adapter state byte preservation.
  - Code-review R4 confirms TNI-CR3-F1 is resolved and closes M2 with no material findings.
  - Package CLI tests prove v0.3.0 bundled metadata, package version, and real release archive compatibility.
  - Package publication tests prove packed-package pre-publish smoke runs real non-dry-run default and `--write-state` init for codex, claude, and opencode.
  - Release validation tests prove v0.3.0 release verification invokes package smoke, builds release archives, validates release metadata, and records post-publish target smoke evidence.
  - Code-review R5 records the M3 post-publish target-smoke evidence detail gap before M3 closeout.
  - Post-publish target-smoke evidence tests resolve TNI-CR5-F1 by requiring installed root(s), tree hash value(s), file count(s), and command output summaries before published v0.3.0 evidence can pass.
  - Code-review R6 confirms TNI-CR5-F1 is resolved and closes M3 with no material findings.
  - M4 lifecycle closeout records durable explain-change rationale and broad selected validation evidence before code-review.
  - Code-review R7 confirms M4 lifecycle closeout and broad validation evidence are ready for verify.
  - Final verify confirms branch-ready state after the full change pack is tracked in commit 33d41c6.
