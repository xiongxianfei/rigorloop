requirements:
  - Define the durable `rigorloop.lock` contract before implementation writes the lockfile as source-of-truth state.
  - Preserve the first-slice CLI boundary that planned lockfile content is not enough to authorize durable lockfile writes.
  - Review the lockfile spec before architecture, test planning, or implementation relies on it.
  - Record lockfile ownership, serialization, drift comparison, and partial-failure ordering before execution planning.
  - Plan lockfile implementation as reviewable milestones before test-spec and implementation.
  - Map lockfile requirements, examples, edge cases, security boundaries, and milestones to concrete tests before implementation.
tests:
  - Formal spec-review evidence for `specs/rigorloop-cli-lockfile.md`.
  - Artifact lifecycle validation for the draft spec and review artifacts.
  - Selected CI for the touched spec, follow-up register, and change-local review artifacts.
