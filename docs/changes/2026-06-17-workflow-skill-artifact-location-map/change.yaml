requirements:
  - Record the workflow skill artifact-location map proposal before proposal-review.
  - Record proposal-review R1 findings and dispositions in durable change-local artifacts.
  - Revise the proposal to resolve WFO-PR1 through WFO-PR3 before downstream spec reliance.
  - Record proposal-review R2 after proposal revision.
  - Settle the accepted proposal status before downstream spec reliance.
  - Draft the workflow skill artifact-location map spec before spec-review.
  - Record spec-review R1 findings before spec revision.
  - Revise the proposal and spec after owner correction to preserve docs/plans/YYYY-MM-DD-slug.md as the canonical detailed plan-body location.
  - Resolve WFO-SR1 through WFO-SR3 before requesting the next spec-review pass.
  - Record spec-review R2 after spec revision.
  - Settle the approved spec status before downstream plan reliance.
  - Create the execution plan and update docs/plan.md before plan-review.
  - Record plan-review R1 after execution plan review.
  - Create the test spec before implementation.
  - Record owner approval of the active test spec before implementation reliance.
  - Implement M1 workflow map and skill contract updates with tests first.
  - Record code-review M1 R1 before M2 implementation reliance.
  - Implement M2 workflow-map structural validation and drift checks with tests first.
  - Record code-review M2 R1 findings before review-resolution.
  - Resolve WFO-CR1 before returning M2 to code-review.
  - Record code-review M2 R2 before M3 implementation reliance.
  - Implement M3 adapter proof, cold-read evidence, behavior-preservation evidence, and explain-change evidence before M3 code-review.
tests:
  - Proposal-review R1 found WFO-PR1 through WFO-PR3 and requested proposal revision.
  - Proposal revision initially accepted WFO-PR1 by choosing docs/changes/<change-id>/plan.md, then the 2026-06-18 owner correction superseded that direction with docs/plans/YYYY-MM-DD-slug.md as the repository-standard detailed plan-body location.
  - Proposal revision accepts WFO-PR2 by choosing a canonical fenced YAML artifact registry plus synchronized Markdown tables for docs/workflows.md.
  - Proposal revision accepts WFO-PR3 by limiting first-slice stage-skill edits to directly contradictory placement text.
  - Proposal-review R2 approves the revised proposal with no material findings.
  - Upstream status settlement updates the proposal status from draft to accepted.
  - Spec authoring creates specs/workflow-skill-artifact-location-map.md with requirements for workflow-map generation, YAML registry shape, Markdown projection consistency, plan-location policy, review placement, source rank, portability, drift validation, and migration boundaries.
  - Spec-review R1 found WFO-SR1 through WFO-SR3 and requested spec revision.
  - Spec revision resolves WFO-SR1 by aligning the spec with the repository-standard docs/plans/YYYY-MM-DD-slug.md plan-body contract.
  - Spec revision resolves WFO-SR2 by allowing deterministic non-path PR handoff registry entries through external_surface or policy.
  - Spec revision resolves WFO-SR3 by requiring project-local formal review customizations to remain under docs/changes/<change-id>/reviews/ unless a higher-priority source permits another path.
  - Spec-review R2 approves the revised spec with no material findings.
  - Upstream status settlement updates the spec status from draft to approved.
  - Plan authoring creates docs/plans/2026-06-18-workflow-skill-artifact-location-map.md with M1 workflow map and skill contract updates, M2 validation and drift checks, and M3 adapter proof and lifecycle closeout.
  - docs/plan.md indexes the active plan with a relative clickable link.
  - Plan-review R1 approves the execution plan with no material findings.
  - Test spec authoring creates specs/workflow-skill-artifact-location-map.test.md with requirement, example, edge-case, fixture, validation-command, and manual cold-read proof coverage.
  - Owner approval confirms the active test spec is approved for implementation reliance.
  - M1 implementation adds workflow-map registry/default-path tests, updates docs/workflows.md with the canonical artifact registry and Markdown projections, and updates skills/workflow/SKILL.md with current artifact-location behavior and default paths.
  - M1 leaves skills/plan/SKILL.md, skills/proposal-review/SKILL.md, and skills/spec-review/SKILL.md unchanged because inspected placement text already matched the approved map.
  - Code-review M1 R1 is clean-with-notes with no material findings and hands off to M2 implementation.
  - M2 implementation adds structural artifact registry validation, registry/table drift checks, workflow skill default drift checks, directly affected stage-skill contradiction checks, stale change-pack plan-path rejection, formal review path rejection outside the change pack, and unknown artifact-type blocker tests.
  - Code-review M2 R1 found WFO-CR1 and requested review-resolution.
  - WFO-CR1 resolution requires architecture_record and adr in workflow artifact-map required-entry validation and adds regression coverage for both missing-entry cases.
  - Code-review M2 R2 is clean-with-notes with no material findings and hands off to M3 implementation.
  - M3 implementation records behavior-preservation evidence with cold-read answers for required placement questions and explain-change rationale before M3 code-review.
