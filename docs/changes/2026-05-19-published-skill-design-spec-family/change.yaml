  - Test-spec amendment for spec-family routing, preservation, parity, and validation evidence.
  - Skill audit and routing coverage evidence under docs/changes/2026-05-19-published-skill-design-spec-family/.
  - Focused skill validator tests when deterministic checks are added or extended.
  - Canonical skill validation for skills/spec/SKILL.md and skills/spec-review/SKILL.md.
  - Generated skill and temporary adapter archive validation from canonical skills.
  - Behavior-preservation and behavior-parity evidence for spec and spec-review.
