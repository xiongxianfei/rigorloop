change_id: 2026-05-08-single-workflow-lane-explain-before-verify
title: Single workflow lane, explain-change before verify, and public skill surface boundary
classification: workflow-governance-proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-08-single-workflow-lane-explain-before-verify.md
  spec: specs/rigorloop-workflow.md
  architecture: docs/architecture/system/architecture.md
  plan: docs/plans/2026-05-08-single-workflow-lane-explain-before-verify.md
  review_resolution: docs/changes/2026-05-08-single-workflow-lane-explain-before-verify/review-resolution.md
requirements:
  - Define a reviewable proposal direction for one recommended standard workflow.
  - Move durable explain-change before final verify in the recommended workflow direction.
  - Define the public skill surface boundary for project-portable shipped skills.
  - Resolve proposal-review findings SWF1 through SWF8 before downstream spec authoring relies on the proposal.
  - Record proposal-review R2 approval before downstream spec authoring relies on the proposal.
  - Draft workflow spec amendments for one standard workflow, isolated manual skill invocation, and `explain-change -> verify -> pr`.
  - Draft autoprogression spec amendments for standard-workflow final closeout routing.
  - Draft skill-contract spec amendments for exact published-skill portability allow and block policy.
  - Resolve spec-review findings SR1 through SR3 by removing proportional-evidence wording, routing final milestone closeout before verify, and refreshing next-artifact sections.
  - Align public workflow guidance, canonical skills, generated skills, and adapter packages to the approved standard-workflow/manual-invocation policy.
  - Record spec-review R2 findings SR4 through SR7 before downstream fixes rely on the amended contract.
  - Resolve spec-review findings SR4 through SR7 by removing stale route vocabulary, replacing direct-verify closeout wording with final-closeout readiness, aligning autoprogression vocabulary, and updating matching test specs.
  - Record spec-review R3 finding SR8 before downstream fixes rely on the amended milestone-aware closeout contract.
  - Resolve spec-review finding SR8 by replacing remaining direct-verify closeout wording with final closeout routing and static regression checks.
  - Record spec-review R4 finding SR9 before downstream fixes rely on the amended public workflow-surface contract.
  - Resolve spec-review finding SR9 by removing remaining retired route vocabulary, regenerating derived output, and adding case-insensitive hyphen/space-aware static checks.
  - Record spec-review R5 approval before downstream artifacts rely on the amended workflow spec.
  - Update the canonical architecture package directly with the lowest-sufficient architecture surface rule for no-impact rationale, direct canonical update, change-local delta, and ADR choices.
  - Create an active execution plan that records current blockers, milestone sequence, validation strategy, and final closeout gates for the workflow-governance implementation.
  - Record plan-review R1 findings before downstream plan fixes rely on the review outcome.
  - Record architecture-review R1 approval before downstream plan fixes rely on the canonical architecture package update.
  - Resolve plan-review finding PLR3 by marking lifecycle closeout as a lifecycle-closeout milestone type instead of an implementation milestone state.
  - Resolve plan-review findings PLR1 and PLR2 by normalizing approved architecture status/readiness and separating test-spec authoring readiness from implementation proof-map readiness.
  - Record plan-review R2 approval before downstream test-spec authoring relies on this execution plan.
  - Confirm matching test-spec proof surfaces for the approved plan before implementation M1 begins.
  - Normalize approved source artifact lifecycle status, next artifacts, follow-on artifacts, and readiness for M1.
  - Record code-review R1 finding CR1 before M1 review-resolution relies on the finding.
  - Record learn-session observation for code-review R1 timing-dependent evidence without routing a durable lesson.
  - Resolve code-review R1 finding CR1 as already fixed by review bookkeeping.
  - Record clean code-review R2 and close M1 before M2 implementation begins.
  - Implement M2 workflow contract and contributor guidance alignment before code-review M2.
  - Record clean code-review R3 and close M2 before M3 implementation begins.
  - Correct the M1/M2 closeout commit gap before continuing M3.
  - Implement M3 canonical skill and public skill portability alignment before code-review M3.
  - Resolve code-review R4 findings CR2 and CR3 before rerun code-review M3.
tests:
  - Artifact lifecycle validation for the proposal.
  - Artifact lifecycle validation for the draft spec amendments.
  - Change metadata validation for this change-local root.
  - Review artifact closeout validation for proposal-review findings.
  - Review artifact closeout validation for spec-review findings.
  - Selector-selected validation for changed proposal, spec, and review artifacts.
  - Skill and adapter generation drift validation after canonical skill and adapter-template updates.
  - Static phrase scan for retired workflow-lane terms and internal-path leakage in public skill surfaces.
  - Review artifact structure validation after spec-review R2 recording.
  - Focused stale-term scans and selected CI after spec-review R2 resolution.
  - Review artifact structure validation after spec-review R3 recording.
  - Focused stale direct-verify closeout scan and selected validation after spec-review R3 resolution.
  - Review artifact structure validation after spec-review R4 recording.
  - Focused public retired-route wording scan and generated-output drift checks after spec-review R4 resolution.
  - Review artifact closeout validation after spec-review R5 approval.
  - Canonical architecture package and C4 diagram lifecycle, change metadata, selector-selected CI, whitespace, and diff checks.
  - Plan index and plan-body lifecycle validation, change metadata validation, selector-selected CI, whitespace, and diff checks.
  - Review artifact structure validation after plan-review R1 recording.
  - Review artifact structure validation after architecture-review R1 recording.
  - Plan and review artifact validation after PLR3 resolution.
  - Review artifact closeout, lifecycle, and selected CI validation after PLR1 and PLR2 resolution.
  - Review artifact closeout, lifecycle, change metadata, and selected CI validation after plan-review R2 approval.
  - Test-spec proof-map updates for workflow, autoprogression, milestone-aware handoff, and skill-contract public-surface coverage.
  - M1 lifecycle validation for approved workflow, autoprogression, and skill-contract source artifacts.
  - Review artifact structure validation after code-review R1 recording.
  - Learn-session artifact validation after code-review timing observation.
  - Review artifact closeout validation after CR1 resolution.
  - Review artifact closeout, lifecycle, change metadata, selected CI, diff, and whitespace validation after code-review R2 and M1 closeout.
  - M2 static skill-validator, selector-regression, selected-validation, lifecycle, change metadata, diff, and whitespace validation before code-review M2.
  - Review artifact closeout, lifecycle, change metadata, selected CI, diff, and whitespace validation after code-review R3 and M2 closeout.
  - M1/M2 catch-up milestone commit correction before M3 continues.
  - M3 skill validation, skill-validator regression, selector regression, retired-route scan, public skill internal-detail scan, selected CI, diff, and whitespace validation before code-review M3.
  - Code-review R4 review-recording validation after CR2 and CR3 are recorded.
  - CR2/CR3 review-resolution validation with stale final-closeout phrase checks, generated-output drift checks, adapter distribution tests, review artifact closeout validation, selected CI, diff, and whitespace checks before rerun code-review M3.
