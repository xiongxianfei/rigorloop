  - M1 added README guide navigation, workflow guide ownership routing, and project-map boundary wording; stage skills were unchanged because no direct contradiction was found.
  - Code-review M1 R1 closed M1 with no material findings.
  - M2 added scripts/validate-guide-system.py and regression fixtures for README guide links, workflow guide sections, project-map scope, plan-index boundary, learn-session non-authority, stage-skill plan defaults, and registry duplication.
  - M2 selector routing selects guide_system.validate for README, workflow guidance, project-map, plan-index, learn, vision, and governance surfaces, and guide_system.regression for guide validator source changes.
  - M2 kept validate-skills.py unchanged; no cross-guide checks were added to skill validation.
  - Code-review M2 R1 found GUIDE-CR1 because guide-system validation partially duplicates workflow-map registry checks instead of composing or selecting the existing workflow-map validator that owns registry/table consistency.
  - GUIDE-CR1 was accepted and resolved by refactoring GUIDE-008 to compose skill_validation.validate_workflow_artifact_map_contract and adding regression coverage for workflow-map-owned registry/table mismatch reporting.
  - Code-review M2 R2 closed M2 with no material findings after GUIDE-CR1 resolution.
  - M3 added behavior-preservation proof for required guide surfaces and compatibility boundaries.
  - M3 added cold-read proof answering common guide-routing questions from current guide surfaces without chat history or learn-session archaeology.
  - M3 added explain-change durable reasoning and recorded that adapter packaging proof is not triggered because no canonical skill files or generated adapter outputs changed.
  - M3 registered the exact guide-cold-read.md change-local evidence path after selected CI blocked unregistered deterministic evidence.
  - Code-review M3 R1 closed M3 with no material findings.
  - Explain-change updated the durable rationale with file-by-file diff rationale, test mapping, review-resolution summary, alternatives, scope control, and remaining risks.
  - Final verify passed focused guide-system validation, review closeout validation, selected CI, broad smoke, lifecycle validation, and whitespace checks.
  - PR #100 was opened for human review after branch-ready and PR handoff checks passed.
  - README now separates adapter installation, standing repository guide bootstrap, and the per-change lifecycle.
  - README now lists the usual new-repository bootstrap order as vision before constitution, then project map, workflow guide, and `docs/plan.md`.
  - PR #100 merged after hosted CI success; the plan body is terminal done, the plan index moved the initiative to Done recent, and the oldest Done recent entry moved to the archive.
