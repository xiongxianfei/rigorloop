requirements:
  - Resolve proposal-review findings RTF1 through RTF6 before downstream spec authoring relies on the proposal.
  - Record proposal-review R2 approval after RTF1 through RTF6 are resolved.
  - Keep the release benchmark policy explicit about waiver semantics, raw or sanitized run evidence, analyzer summary shape, RC reuse, implementation milestones, and warning severity labels.
  - Normalize the reviewed proposal to accepted before relying on it for a downstream feature spec.
  - Draft the release Token-Friendliness benchmark feature spec with examples, stable requirement IDs, boundary behavior, and acceptance criteria.
  - Normalize the approved spec before architecture relies on it.
  - Record release Token-Friendliness benchmark architecture in the canonical architecture package.
  - Create the execution plan and index it in docs/plan.md before implementation.
  - Resolve plan-review R1 finding RTF-PLR1 before test-spec or implementation relies on the execution plan.
  - Record plan-review R2 approval before creating the matching test spec.
  - Create the release Token-Friendliness benchmark test spec before implementation.
  - Implement M1 as a standalone token-cost report validator without release-level delegation.
  - Resolve code-review R1 findings RTF-CR1 and RTF-CR2 before M1 can close.
  - Return M1 to code-review after accepted code-review R1 findings are fixed.
  - Resolve code-review R2 finding RTF-CR3 before M1 can close.
  - Return M1 to code-review after accepted code-review R2 findings are fixed.
  - Record clean code-review R3 before closing M1 and handing off to M2.
  - Implement M2 benchmark fixture and prompt suite before M2 code-review.
  - Record clean code-review R4 before closing M2 and handing off to M3.
  - Implement M3 runner and analyzer-summary integration before M3 code-review.
  - Resolve code-review R5 findings RTF-CR4, RTF-CR5, and RTF-CR6 before M3 can close.
  - Return M3 to code-review after accepted code-review R5 findings are fixed.
  - Record clean code-review R6 before closing M3 and handing off to M4.
  - Implement M4 first baseline report and release report template before M4 code-review.
  - Resolve code-review R7 finding RTF-CR7 before M4 can close.
  - Return M4 to code-review after accepted code-review R7 finding is fixed.
  - Record clean code-review R8 before closing M4 and handing off to M5.
  - Implement M5 release validation integration and documentation before M5 code-review.
tests:
  - Artifact lifecycle validation for the proposal and change-local review artifacts.
  - Artifact lifecycle validation for the new feature spec.
  - Review artifact validation for proposal-review finding closeout.
  - Review artifact structure validation after spec-review material findings are recorded.
  - Artifact lifecycle validation for the approved spec and canonical architecture update.
  - Artifact lifecycle validation for the execution plan and plan index.
  - Review artifact structure validation after plan-review material findings are recorded.
  - Review artifact closeout validation after plan-review R2 approval.
  - Artifact lifecycle validation for the active test spec and implementation handoff.
  - Focused M1 validator tests for schema, dynamic status, waiver, raw/sanitized evidence, comparison, portability, and runner metadata.
  - Review artifact structure validation after code-review R1 material findings are recorded.
  - Focused M1 validator tests for RC reuse metadata and Markdown/YAML pairing after code-review R1 resolution.
  - Review artifact structure validation after code-review R2 material finding is recorded.
  - Focused M1 validator tests for complete RC reuse checked-surface coverage after code-review R2 resolution.
  - Review artifact closeout validation after clean code-review R3 closes M1.
  - Focused M2 fixture tests for benchmark manifest, prompt files, clean fixture contents, no installed skill copies, and no generated-surface references.
  - Review artifact closeout validation after clean code-review R4 closes M2.
  - Focused M3 runner/analyzer tests for schema version 1 summaries, raw JSONL omission, temp fixture setup, public skill installation, source rejection, cleanup behavior, analyzer invocation, and no Markdown generation.
  - Review artifact structure validation after code-review R5 material findings are recorded.
  - Focused M3 runner/analyzer tests for repo-relative summary paths, repeated capped reads, justified whole-file reads, justified generated-output reads, and mixed justified/unjustified reads.
  - Review artifact closeout validation after clean code-review R6 closes M3.
  - Focused M4 report validation for baseline YAML, Markdown/YAML pairing, sanitized run summaries, release notes link, and runner command reproducibility.
  - Review artifact structure validation after code-review R7 material finding is recorded.
  - Focused analyzer test for current Codex `item.completed` `command_execution` events with `aggregated_output`.
  - Corrected M4 report validation after regenerated analyzer summaries include command-output amplification.
  - Review artifact closeout validation after clean code-review R8 closes M4.
  - Focused release validation tests for governed `v0.1.1` token-cost evidence and historical release scope.
  - Release verifier proof that `v0.1.1` invokes token-cost report validation.
  - Code-review R9 review artifact recording for M5.
  - Focused release validation integration test proving invalid governed token-cost metadata blocks through validator delegation.
  - T16 test-spec clarification for delegated validator failure propagation.
  - Review artifact closeout validation after clean code-review R10 closes M5.
  - Durable explain-change rationale for the release Token-Friendliness benchmark implementation.
