  - Accept the record-every-formal-review proposal before specification.
  - Define the clean formal review receipt contract in the governing formal review recording spec.
  - Preserve material-finding review records and review-resolution behavior.
  - Keep clean receipts separate from artifact lifecycle/status settlement.
  - Reserve Recording status not-required for non-formal review-like requests.
