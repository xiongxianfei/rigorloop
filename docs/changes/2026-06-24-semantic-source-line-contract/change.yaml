change_id: 2026-06-24-semantic-source-line-contract
title: Semantic source-line contract for review-critical Markdown
classification: proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-06-24-semantic-source-line-contract.md
  spec: specs/documentation-source-formatting.md
  test_spec: specs/documentation-source-formatting.test.md
  plan: docs/plans/2026-06-24-semantic-source-line-contract.md
requirements:
  - Review the semantic source-line contract proposal before spec.
  - Confirm the proposal fits the project vision and source-of-truth rules.
  - Confirm scope preservation for the initial request and follow-up routing.
  - Record proposal-review R1 as durable formal review evidence.
  - Keep the review isolated; do not automatically start spec.
  - Persist owner authorization for workflow-managed authoring through plan-review.
  - Settle the accepted proposal status before downstream spec reliance.
  - Settle the approved spec status before planning reliance.
  - Record architecture assessment before planning.
  - Create a reviewed execution plan before test-spec and implementation.
  - Create an active test spec before implementation.
  - Record owner approval of the active test spec before implementation.
  - Implement M1 documentation prose validation fixtures and non-mutating validator behavior.
tests:
  - Proposal-review R1 approves or records material findings for the proposal.
  - Review-log indexes proposal-review R1 with zero material findings when clean.
  - Proposal status is normalized from draft to accepted before downstream spec reliance.
  - Spec-review R1 approves or records material findings for the documentation source-formatting spec.
  - Review-log indexes spec-review R1 with zero material findings when clean.
  - Architecture assessment records whether architecture is required before planning.
  - Plan maps approved requirements to reviewable implementation milestones and validation commands.
  - Plan-review R1 approves or records material findings for the execution plan.
  - Review-log indexes plan-review R1 with zero material findings when clean.
  - Test spec maps documentation source-formatting requirements, examples, and edge cases to concrete tests.
  - Owner approval confirms the active test spec may be used for M1 implementation.
  - Documentation prose validator fixtures exercise pass, fail, warning, CLI, and non-mutation behavior.
  - Code-review M1 R1 records material findings for explicit hard-break handling and mechanically continued list-item handling.
  - Review-resolution fixes explicit hard-break handling and mechanically continued list-item handling before rerun code-review.
  - Code-review M1 R2 confirms review-resolution and closes M1.
  - M2 adds concise contributor guidance, formatter guardrails, and Tier A source-line cleanup.
  - Code-review M2 R1 confirms contributor guidance, formatter guardrails, and Tier A cleanup before M3.
  - M3 routes documentation prose validation through selected validation and records behavior preservation.
  - Code-review M3 R1 confirms selected-validation routing and behavior-preservation evidence before final closeout.
  - Explain-change records durable rationale before final verify.
  - Verify confirms local branch-ready evidence for the semantic change slice and records stacked-base PR targeting constraints.
  - PR handoff opens PR #107 against the stacked predecessor base.
