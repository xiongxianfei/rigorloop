change_id: 2026-06-24-semantic-source-line-contract
title: Semantic source-line contract for review-critical Markdown
classification: proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-06-24-semantic-source-line-contract.md
  spec: specs/documentation-source-formatting.md
