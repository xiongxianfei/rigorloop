requirements:
  - Record the workflow-state projection and pre-transition synchronization gate proposal before proposal-review.
  - Preserve the existing Single Source of Workflow State ownership model while proposing enforcement hardening.
  - Record proposal-review R1 as durable review evidence.
  - Settle the accepted proposal status before downstream spec reliance.
  - Amend the Single Source of Workflow State spec with owner/projection/pointer/ledger/evidence roles, mechanical projections, state-sync gate enforcement, stale-token boundaries, review consistency, and migration rules.
  - Record spec-review R1 findings before downstream spec reliance.
  - Revise the spec to resolve WSS-SR1 and WSS-SR2 without advancing beyond changes-requested before re-review.
  - Update the canonical architecture package for the validation and workflow-state synchronization responsibilities introduced by the approved spec.
  - Create the execution plan after proposal, spec, and architecture review approve the governing artifacts.
  - Revise the execution plan to resolve WSS-PLAN1 by moving test-spec authoring out of implementation milestones.
  - Update the Single Source of Workflow State test spec with traceable workflow-state projection, owner-field, stale-token, review-evidence, and enforcement-scope tests before implementation.
  - Add M1 parser scaffolding and fixture-backed lifecycle validation tests for deterministic workflow-state owner and projection parsing.
  - Bind workflow-state synchronization guidance to pre-transition handoff claims without making public skills depend on repository-local script paths.
  - Record durable explain-change rationale before final verify.
tests:
  - Proposal-review R1 approves the proposal with no material findings.
  - Review-log indexes proposal-review R1 with zero material findings.
  - Proposal status is normalized from draft to accepted before spec reliance.
  - Spec amendment records testable requirements for WSS projection and synchronization behavior before spec-review.
  - Spec-review R1 records WSS-SR1 and WSS-SR2 as open material findings requiring spec revision.
  - Spec revision defines closed `Review status` and final-closeout reason-code syntax.
  - Spec revision defines authoritative `docs/plan.md` projection sources for `Plan`, `State`, `Next stage`, and `Change ID`.
  - Spec-review R2 approves the revised spec with no material findings and closes WSS-SR1 and WSS-SR2.
  - Architecture update records workflow-state synchronization as a bounded lifecycle-validation responsibility with no new ADR required.
  - Architecture-review R1 approves the canonical architecture update with no material findings.
  - Execution plan records five implementation milestones, validation commands, recovery sequencing, and the current handoff owner state before plan-review.
  - Plan-review R1 records WSS-PLAN1 as an open material finding requiring plan revision before test-spec or implementation.
  - Plan revision makes M1 consume the completed test spec instead of authoring it.
  - Plan-review R2 approves the revised plan and closes WSS-PLAN1.
  - Test spec maps WSS enforcement requirements, examples, error behavior, migration behavior, and acceptance criteria to concrete test cases before implement M1.
  - Maintainer approval confirms the active test spec is ready for M1 implementation consumption.
  - Workflow-state parser tests fail before M1 implementation and pass after parser integration.
  - Artifact-lifecycle validation rejects malformed structured owner fields, invalid final-closeout reason-code combinations, plan-index projection drift, change-id drift, duplicate active projection rows, and live readiness restatements.
  - Code-review M1 R1 records WSS-CR1 as an open material finding requiring review-resolution before M1 can close.
  - WSS-CR1 resolution adds shared index-to-owner resolution and regression coverage for index-only projection validation before code-review M1 R2.
  - Code-review M1 R2 approves the WSS-CR1 resolution with no material findings and closes M1.
  - M2 adds current milestone-state projection validation and stricter `Readiness` live-route rejection before code-review M2.
  - Code-review M2 R1 approves the parser and lifecycle state-sync validator slice with no material findings and closes M2.
  - M3 adds review evidence summary derivation, change metadata review count consistency, and owner-state blocking while material findings remain open.
  - WSS-CR2 resolves the M3 review finding by routing review evidence summaries and closeout-mode review validation through one finding closure predicate.
  - Code-review M3 R2 records WSS-CR3 as an open material finding for missing or unsupported disposition handling in the shared closure predicate.
  - WSS-CR3 resolves by making the shared closure predicate require positive evidence for parseable disposition state and validation evidence across all consumers.
  - Code-review M3 R3 approves the WSS-CR3 resolution with no material findings and closes M3.
  - M4 adds static regression coverage proving workflow guidance and stage skills require a binding state-sync gate before downstream handoff claims.
  - M4 records the active/blocked audit and normalizes the missing active plan `Change ID` projection source without rewriting unrelated legacy handoff prose.
  - Code-review M4 R1 records WSS-CR4 as an open material finding requiring review-resolution before M4 can close.
  - WSS-CR4 resolves by keying active/blocked audit change metadata association by `change_id` and adding multi-active-plan regression coverage before code-review M4 R2.
  - Code-review M4 R2 approves the WSS-CR4 resolution with no material findings and closes M4.
  - M5 records behavior-preservation evidence and proves the whole workflow-state synchronization slice with the full lifecycle, review-artifact, and change-metadata validation set before code-review M5.
  - Code-review M5 R1 approves the behavior-preservation and closeout evidence with no material findings and closes the implementation milestone set.
  - Explain-change is recorded before final verify and does not claim branch readiness or PR readiness.
  - Verify routes every changed path through selected CI, including workflow-state synchronization helpers.
  - Final verify passes PR-mode selected CI, broad smoke, review closeout validation, change metadata validation, focused lifecycle validation, and all-active lifecycle audit before PR handoff.
  - PR handoff synchronizes the active plan and plan index to hosted CI and human review before opening the pull request.
  - PR #103 is open for hosted CI and human review.
