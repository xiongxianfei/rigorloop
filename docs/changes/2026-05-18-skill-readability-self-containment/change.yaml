requirements:
  - Review the skill readability and self-containment proposal before specification.
  - Confirm the proposal preserves the priority order of output quality, clarity, then token cost.
  - Confirm the proposal declares its relationship to the accepted customer-portable public skills proposal.
  - Confirm scope preservation, Vision fit, standing artifact gates, and readiness for focused specification.
  - Settle accepted proposal status before downstream spec reliance.
  - Create the focused skill readability and self-containment spec.
  - Settle approved spec status before downstream plan reliance.
  - Create the execution plan and update docs/plan.md.
  - Create the active test spec before implementation starts.
  - Add opt-in static validation for the skill readability contract.
  - Record baseline token evidence for the pilot pair before skill rewrites.
  - Review and close M1 before starting M2.
  - Rewrite the pilot `proposal` and `proposal-review` skills for the readability contract.
  - Validate generated skill and adapter output from canonical skill source after the M2 rewrite.
  - Record cold-read evidence against installed adapter output for the pilot pair.
  - Record behavior-parity evidence with `equivalent`, `improvement`, or `regression` classifications.
  - Record after-change token comparison against the M1 baseline and approved thresholds.
  - Preserve follow-on rollout ownership for the remaining R30 skills with no silent exclusions.
tests:
  - Formal proposal-review evidence for docs/proposals/2026-05-18-skill-readability-self-containment.md.
  - Review artifact validation for the proposal-review record.
  - Artifact lifecycle validation for the reviewed proposal.
  - Artifact lifecycle validation for the new spec.
  - Artifact lifecycle validation for the active plan and plan index.
  - Artifact lifecycle validation for the active test spec.
  - Focused skill validator tests for the opt-in readability checks.
  - Canonical skill validation remains green before the pilot skill rewrite.
  - Static skill token baseline for `proposal` and `proposal-review`.
  - Clean code-review evidence for M1.
  - Pilot pair opts into schema-version skill-readability-v1 and passes focused static validation.
  - Generated adapter archives validate from canonical skill source for the current adapter manifest version.
  - Clean code-review evidence for M2.
  - Installed adapter cold-read evidence passes for the pilot pair.
  - Behavior-parity comparison records no `regression` classifications.
  - Token comparison remains within the approved +5% tolerance and below the +10% hard cap.
  - Follow-on rollout ownership for non-pilot R30 skills remains recorded in the active plan.
