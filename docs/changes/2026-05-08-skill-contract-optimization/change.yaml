change_id: 2026-05-08-skill-contract-optimization
title: Skill contract optimization
classification: workflow-governance-proposal
risk: medium
artifacts:
  proposal: docs/proposals/2026-05-08-skill-contract-optimization.md
  spec: specs/skill-contract.md
  test_spec: specs/skill-contract.test.md
  plan: docs/plans/2026-05-08-skill-contract-optimization.md
  explain_change: docs/changes/2026-05-08-skill-contract-optimization/explain-change.md
  review_resolution: docs/changes/2026-05-08-skill-contract-optimization/review-resolution.md
requirements:
  - Define a reviewable proposal direction for making RigorLoop skills smaller, claim-safe, summary-first, and handoff-explicit.
  - Create the contract-level feature spec for `specs/skill-contract.md`.
  - Create an execution plan and lifecycle index entry for implementing the approved skill contract in reviewable milestones.
  - Create an active test spec mapping the approved skill contract requirements, examples, edge cases, and acceptance criteria to concrete static proof.
  - Resolve proposal-review findings SCO1, SCO2, SCO3, SCO4, SCO6, SCO7, and SCO8 before downstream proposal reliance.
  - Record proposal-review R2 approval after the remaining proposal decisions are added.
  - Keep the first implementation slice explicit and avoid normalizing every skill in the first slice.
  - Define the normative home for the skill contract before validators enforce it.
  - Preserve generated-output boundaries by treating `.codex/skills/` and `dist/adapters/` as derived output.
  - Add concise skill-contract summary pointers to workflow, contributor, and agent-facing guidance.
  - Create canonical v1 shared-block sources for evidence collection efficiency and generated-output handling.
  - Normalize the first-slice canonical skills with required core sections, claim boundaries, compact result output, local handoff guidance, and copied shared blocks.
  - Regenerate local Codex skill mirrors and public adapter skill copies from canonical first-slice skills.
tests:
  - Artifact lifecycle validation for the approved skill contract spec.
  - Artifact lifecycle validation for the active skill contract test spec.
  - Artifact lifecycle validation for the active skill contract optimization execution plan and plan index entry.
  - Artifact lifecycle validation for the proposal and change-local artifacts.
  - Change metadata validation for this change-local root.
  - Review artifact closeout validation for proposal-review findings.
  - Selector-selected validation for changed proposal and review artifacts.
  - Skill validator regression coverage for M2 skill-contract summary surfaces and shared-block source files.
  - Skill validator regression coverage for M3 first-slice core sections, result blocks, claim boundaries, readiness wording, and copied shared blocks.
  - Generated-output drift checks and adapter validation for M4 generated skill and adapter copies.
