requirements:
  - Review the proposal-gated authoring autoprogression proposal before spec.
  - Preserve the proposal as the human decision checkpoint.
  - Keep the profile bounded to authoring through plan-review and stop before test-spec or implementation.
  - Confirm that direct review invocations remain isolated.
  - Record proposal-review R1 as durable formal review evidence.
  - Settle the accepted proposal status before downstream spec reliance.
  - Amend the workflow-stage autoprogression spec with the closed authoring-through-plan-review profile contract.
  - Amend the RigorLoop workflow spec with stage-order, isolation, state, and metadata ownership rules for the profile.
  - Keep both spec amendments in draft until spec-review approves them.
  - Resolve spec-review finding SR-APGA-001 by making durable profile authorization persistence mandatory before activation.
  - Add test-spec coverage for APGA-031 through APGA-036 and behavior-preservation evidence for the persistence tightening.
  - Settle the approved spec statuses before architecture reliance after spec-review R2.
  - Record canonical architecture impact for workflow orchestration, profile policy persistence, review independence, architecture assessment routing, and generated guidance alignment.
  - Record the durable profile architecture decision in an ADR before planning.
  - Create a reviewed execution plan that sequences policy persistence, workflow routing, stage skill alignment, generated guidance validation, and integration closeout.
tests:
  - Proposal-review R1 approves or records material findings for the proposal.
  - Review-log indexes proposal-review R1 with zero material findings when clean.
  - Proposal status is normalized from draft to accepted before downstream spec reliance.
  - Workflow-stage autoprogression spec defines profile values, gate activation, architecture assessment, stop conditions, transition budget, completion boundary, and off-by-default behavior.
  - RigorLoop workflow spec keeps direct review requests isolated and prevents profile metadata from owning live state.
  - APGA-031 through APGA-036 cover missing, malformed, failed, pre-pack, cancellation, and fallback authorization-persistence behavior.
  - Behavior-preservation evidence records mandatory authorization persistence as an intentional tightening.
  - Spec-review R2 approves the spec amendments with no material findings.
  - Canonical architecture records the authoring-through-plan-review runtime flow, no-service deployment boundary, policy metadata ownership, audit trail, stop conditions, and architecture-review handoff.
  - ADR records the durable decision for the bounded profile, persistence surface, architecture assessment, review independence, and stop-before-test-spec boundary.
  - Plan maps approved requirements and APGA checks to reviewable implementation milestones with validation commands and recovery paths.
