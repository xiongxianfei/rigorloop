# Copy and fill this GitHub Actions workflow structure from project policy.
name: CI

on:
  pull_request:
    paths:
      - "<scoped paths from risk map>"
  push:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "<boundary schedule>"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changed-risk:
    name: Changed-risk checks
    runs-on: ubuntu-latest
    timeout-minutes: <timeout>
    steps:
      - name: Checkout
        uses: actions/checkout@<full-length-sha-or-policy-approved-ref>

      - name: Setup runtime
        uses: <setup-action>@<full-length-sha-or-policy-approved-ref>
        with:
          <runtime inputs>

      - name: Restore dependency cache
        if: <stable lockfile cache key exists>
        uses: actions/cache@<full-length-sha-or-policy-approved-ref>
        with:
          path: <dependency cache path>
          key: ${{ runner.os }}-<ecosystem>-${{ hashFiles('<lockfile path>') }}

      - name: Install dependencies
        run: <deterministic install command from allowed command source>

      - name: Run scoped checks
        run: <scoped validation command from allowed command source>

  boundary:
    name: Boundary checks
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: <timeout>
    steps:
      - name: Checkout
        uses: actions/checkout@<full-length-sha-or-policy-approved-ref>

      - name: Run comprehensive checks
        run: <comprehensive validation command from allowed command source>
