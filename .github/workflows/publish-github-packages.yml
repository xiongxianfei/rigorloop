name: publish-github-packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish to GitHub Packages, such as v0.3.3"
        required: true
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: github-packages-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Validate tag input
        run: |
          tag="${{ inputs.tag }}"
          if [[ ! "$tag" =~ ^v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
            echo "GitHub Packages publication requires a stable semver tag, got: ${tag}" >&2
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://npm.pkg.github.com
          scope: "@xiongxianfei"

      - name: Validate package version
        run: |
          tag="${{ inputs.tag }}"
          expected_version="${tag#v}"
          package_version="$(node -p "require('./packages/rigorloop/package.json').version")"
          if [[ "$package_version" != "$expected_version" ]]; then
            echo "packages/rigorloop/package.json version ${package_version} does not match ${tag}" >&2
            exit 1
          fi

      - name: Verify package before publication
        run: python scripts/test-npm-package-publication.py

      - name: Publish to GitHub Packages
        run: npm publish --registry=https://npm.pkg.github.com --access public ./packages/rigorloop
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
