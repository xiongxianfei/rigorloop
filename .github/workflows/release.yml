name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify release readiness
        run: bash scripts/release-verify.sh "$GITHUB_REF_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          notes_file="docs/releases/${tag}/release-notes.md"
          args=("$tag" --verify-tag --notes-file "$notes_file")
          if [[ "$tag" == *-rc.* ]]; then
            args+=(--prerelease --latest=false)
          fi
          gh release create "${args[@]}"
